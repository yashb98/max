<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover is required for iOS WKWebView to expose env(safe-area-inset-*);
       without it the Capacitor shell renders under the notch / home indicator. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="icon" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <title>Vellum Assistant</title>
  <script>
    (function() {
      try {
        var theme = window.localStorage.getItem("vellum_theme") || "system";
        var prefersDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        var shouldBeDark =
          theme === "velvet" ||
          theme === "dark" ||
          (theme === "system" && prefersDark);
        var root = document.documentElement;
        root.setAttribute(
          "data-theme",
          shouldBeDark ? "dark" : "light"
        );
        root.classList.toggle("dark", shouldBeDark);
        root.classList.remove("velvet");
      } catch {
        // Theme startup is best-effort. React will apply the default later.
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
