            minimum: 1
        window:
          $ref: '#/components/schemas/UpgradePolicyWindow'
      required:
      - frequency
      - window
    UpgradePolicyScheduleRequest:
      type: object
      properties:
        frequency:
          $ref: '#/components/schemas/FrequencyEnum'
        days_of_week:
          type: array
          items:
            type: integer
            maximum: 6
            minimum: 0
        days_of_month:
          type: array
          items:
            type: integer
            maximum: 31
            minimum: 1
        window:
          $ref: '#/components/schemas/UpgradePolicyWindowRequest'
      required:
      - frequency
      - window
    UpgradePolicyWindow:
      type: object
      properties:
        start:
          type: string
          pattern: ^([01]\d|2[0-3]):([0-5]\d)$
        end:
          type: string
          pattern: ^([01]\d|2[0-3]):([0-5]\d)$
      required:
      - end
      - start
    UpgradePolicyWindowRequest:
      type: object
      properties:
        start:
          type: string
          minLength: 1
          pattern: ^([01]\d|2[0-3]):([0-5]\d)$
        end:
          type: string
          minLength: 1
          pattern: ^([01]\d|2[0-3]):([0-5]\d)$
      required:
      - end
      - start
    UpgradeRequestRequest:
      type: object
      properties:
        version:
          type: string
          nullable: true
          minLength: 1
    UpgradeResult:
      type: object
      properties:
        detail:
          type: string
        version:
          type: string
          nullable: true
      required:
      - detail
      - version
    UpgradeStatus:
      type: object
      description: |-
        Response shape for the upgrade-status read endpoint.

        `in_progress` reflects whether the `assistant:update-lifecycle:<id>`
        Redis lock is currently held by an in-flight upgrade or rollback.
        Clients use this to proactively disable the Upgrade button rather
        than only soft-handling a 409 from POST /upgrade/.
      properties:
        in_progress:
          type: boolean
      required:
      - in_progress
    UsageBucket:
      type: object
      properties:
        date:
          type: string
          description: Bucket start date in YYYY-MM-DD format.
        groups:
          type: array
          items:
            $ref: '#/components/schemas/UsageGroup'
          description: Usage groups within this bucket.
      required:
      - date
      - groups
    UsageGroup:
      type: object
      properties:
        group_key:
          type: string
          description: Raw grouping value (e.g. 'runtime_proxy_api', 'claude-opus-4-6').
        group_label:
          type: string
          description: Human-readable display label.
        total_usd:
          type: string
          description: Total spend in USD as a decimal string.
        event_count:
          type: integer
          description: Number of usage events.
      required:
      - event_count
      - group_key
      - group_label
      - total_usd
    UsageSeriesResponse:
      type: object
      properties:
        buckets:
          type: array
          items:
            $ref: '#/components/schemas/UsageBucket'
          description: Time-ordered usage buckets.
      required:
      - buckets
    UsageTotalsResponse:
      type: object
      properties:
        total_usd:
          type: string
          description: Total spend in USD as a decimal string.
        event_count:
          type: integer
          description: Number of usage events.
      required:
      - event_count
      - total_usd
  securitySchemes:
    AssistantAPIKey:
      type: apiKey
      in: header
      name: Authorization
      description: API key passed as 'Api-Key <key>' in the Authorization header.
    SDKCompatibleAssistantKey:
      type: apiKey
      in: header
      name: Authorization
      description: Assistant API key via 'Api-Key <key>', 'Bearer <key>', X-Api-Key
        header, or ?key= query parameter.
    VellumAPIKey:
      type: http
      scheme: bearer
      description: Platform API key passed as 'Bearer vak_...' in the Authorization
        header.
    XSessionTokenAuth:
      type: apiKey
      in: header
      name: X-Session-Token
      description: X-Session-Token authentication
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
