    ConnectionStatus:
      type: object
      description: Serializer describing the live reachability of an assistant pod.
      properties:
        state:
          allOf:
          - $ref: '#/components/schemas/StateEnum'
          description: |-
            Coarse reachability bucket. 'ready' means the pod is serving traffic; 'waking' means it is scaling up from idle-sleep; 'crash_loop' means the pod is reporting an error; 'unreachable' means the probe itself failed and the caller should retry.

            * `ready` - ready
            * `waking` - waking
            * `crash_loop` - crash_loop
            * `not_found` - not_found
            * `unreachable` - unreachable
        is_awake:
          type: boolean
        pod_status:
          type: string
          nullable: true
        waking_since:
          type: string
          format: date-time
          nullable: true
        last_ready_at:
          type: string
          format: date-time
          nullable: true
        crash_loop_since:
          type: string
          format: date-time
          nullable: true
        detail:
          type: string
          nullable: true
        pod_error_kind:
          type: string
          nullable: true
          description: Classified root cause of a CRASH_LOOP, when vembda was able
            to infer one (e.g. 'out_of_storage' when the pod has run out of disk space).
            Clients can branch on this to show targeted remediation UI such as a link
            to the storage doctor.
      required:
      - crash_loop_since
      - detail
      - is_awake
      - last_ready_at
      - pod_status
      - state
      - waking_since
