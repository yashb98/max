  /v1/assistants/{assistant_id}/emails/:
    get:
      operationId: assistants_emails_list
      description: List and retrieve email messages for a specific assistant.
      parameters:
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      - in: query
        name: direction
        schema:
          type: string
          enum:
          - inbound
          - outbound
        description: Filter by message direction.
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - in: query
        name: since
        schema:
          type: string
          format: date-time
        description: Only return messages created at or after this ISO 8601 datetime.
      tags:
      - assistants
      security:
      - VellumAPIKey: []
      - SDKCompatibleAssistantKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
