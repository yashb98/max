  /v1/assistants/{assistant_id}/handle-available/:
    get:
      operationId: assistants_handle_available_retrieve
      description: |-
        Live availability check used by the settings UI.

        ``GET /v1/assistants/{assistant_id}/handle-available/?handle=foo``

        Response shape (always 200 even when unavailable — the client renders
        inline state, not a global error):

        .. code-block:: json

            {"available": true,  "code": null,        "message": null}
            {"available": false, "code": "too_short", "message": "Must be at least 3 characters."}
            {"available": false, "code": "taken",     "message": "This handle is already taken."}

        A 429 is returned only when the per-user rate cap is exceeded — the
        request was not evaluated.

        Authorization: the URL is scoped under ``/v1/assistants/{assistant_id}/``
        so the standard ownership filter in :class:`_AssistantAPIView` already
        enforces that the caller can see this assistant. We exclude the
        assistant's own current handle from the "taken" check so the UI can
        treat the existing value as available (useful for re-confirming without
        a save).
      parameters:
      - in: header
        name: Vellum-Organization-Id
        schema:
          type: string
          format: uuid
        description: Required if using Cookie-based or X-Session-Token authentication
          methods.
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      - in: query
        name: handle
        schema:
          type: string
        description: Candidate handle (will be lowercased before check).
        required: true
      tags:
      - assistants
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantHandleAvailability'
          description: ''
        '400':
          description: No response body
        '429':
          description: No response body
      x-vellum-api-clients:
      - platform
  /v1/assistants/{assistant_id}/maintenance-mode/enter/:
    post:
      operationId: assistants_maintenance_mode_enter_create
      description: |-
        Enter maintenance mode for the given assistant.

        Pauses the assistant StatefulSet, hands the workspace PVC off to a debug
        pod, and persists ``maintenance_mode_enabled=True`` on the Assistant row
        only after vembda confirms the handoff succeeded.
      parameters:
      - in: header
        name: Vellum-Organization-Id
        schema:
          type: string
          format: uuid
        description: Required if using Cookie-based or X-Session-Token authentication
          methods.
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - assistants
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
      x-vellum-api-clients:
      - platform
  /v1/assistants/{assistant_id}/maintenance-mode/exit/:
    post:
      operationId: assistants_maintenance_mode_exit_create
      description: |-
        Exit maintenance mode for the given assistant.

        Tears down the debug pod, returns the workspace PVC to the assistant
        StatefulSet, and clears ``maintenance_mode_enabled`` only after vembda
        confirms the StatefulSet handoff is complete.
      parameters:
      - in: header
        name: Vellum-Organization-Id
        schema:
          type: string
          format: uuid
        description: Required if using Cookie-based or X-Session-Token authentication
          methods.
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - assistants
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
      x-vellum-api-clients:
      - platform
  /v1/assistants/{assistant_id}/managed-search-proxy/{provider}/:
    post:
      operationId: assistants_managed_search_proxy_create
      description: Proxy a managed search-provider API request through Vellum. The
        caller supplies the provider-shaped request path/query/body; Vellum validates
        the route, checks billing eligibility, strips caller credentials, injects
        managed provider credentials, and returns the upstream response envelope.
      parameters:
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: provider
        schema:
          type: string
        required: true
      tags:
      - assistants
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManagedSearchProxyRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ManagedSearchProxyRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ManagedSearchProxyRequestRequest'
        required: true
      security:
      - AssistantAPIKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagedSearchProxyResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagedSearchProxyErrorResponse'
          description: ''
        '402':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagedSearchProxyErrorResponse'
          description: ''
        '413':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagedSearchProxyErrorResponse'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagedSearchProxyErrorResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagedSearchProxyErrorResponse'
          description: ''
      x-vellum-api-clients:
      - platform
  /v1/assistants/{assistant_id}/oauth/{provider}/start/:
    post:
      operationId: assistants_oauth_start_create
      description: |-
        Start an OAuth authorization flow for a given provider.

        The requesting user must own the assistant or belong to the same
        organization.
      parameters:
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: provider
        schema:
          type: string
        required: true
      tags:
      - assistants
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthStartRequestRequest'
          application/x-www-form-urlencoded:
            schema:
