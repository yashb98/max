  /v1/organizations/billing/auto-top-up/remove-payment-method/:
    post:
      operationId: organizations_billing_auto_top_up_remove_payment_method_create
      description: |-
        Remove the saved auto top-up payment method and disable automatic top-ups.

        Clears ``AutoTopUpConfig.stripe_payment_method_id`` and sets
        ``enabled=False`` so no future ``attempt_charge`` can fire against
        the removed card.

        The Stripe PaymentMethod object is intentionally **not** detached from
        the customer — it may be referenced by the Pro plan subscription.
        Callers that need to fully remove the card from Stripe can use
        ``PaymentMethodViewSet.destroy`` separately.

        No-op (returns the same disabled payload) when no config row exists or
        the config already has no PM saved.
      parameters:
      - in: header
        name: Vellum-Organization-Id
        schema:
          type: string
          format: uuid
        description: Required if using Cookie-based or X-Session-Token authentication
          methods.
      tags:
      - organizations
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoTopUpDisableResponse'
          description: ''
      x-vellum-api-clients:
      - platform
