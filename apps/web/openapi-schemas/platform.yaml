            * `error` - Error
        last_message_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Timestamp of the most recently appended message, if any.
        ended_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When the session reached a terminal state.
        created:
          type: string
          format: date-time
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
        message_count:
