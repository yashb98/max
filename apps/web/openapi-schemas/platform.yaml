    DoctorSessionDetail:
      type: object
      description: |-
        Detail serializer for a persisted Doctor session with its messages.

        ``messages`` is a nested list of :class:`DoctorMessageSerializer`
        rows.  Callers are expected to preload the related messages with
        ``prefetch_related("messages")`` and pass a queryset ordered by
        ``sequence`` so the output is deterministic.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/DoctorSessionStatusEnum'
          readOnly: true
          description: |-
            Lifecycle status of the session.

            * `active` - Active
            * `completed` - Completed
            * `error` - Error
        last_message_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Timestamp of the most recently appended message, if any.
        ended_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: When the session reached a terminal state.
        created:
          type: string
          format: date-time
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
        messages:
          type: array
          items:
            $ref: '#/components/schemas/DoctorMessage'
          readOnly: true
      required:
      - created
      - ended_at
      - id
      - last_message_at
      - messages
      - modified
      - status
