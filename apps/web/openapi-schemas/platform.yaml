    PatchedAssistantPartialUpdateRequest:
      type: object
      description: |-
        Write surface for ``PATCH /v1/assistants/{id}/``.

        Accepts a narrow allowlist (``name``, ``description``, ``handle``) and
        delegates handle format validation to
        :func:`app.assistant.handle_validation.validate_handle`. Uniqueness is
        enforced at the database layer via the case-insensitive functional
        unique index on ``LOWER(handle)``; the view converts the resulting
        ``IntegrityError`` to a 409 (see :meth:`AssistantViewSet.partial_update`).
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          nullable: true
        handle:
          type: string
          minLength: 1
          maxLength: 150
