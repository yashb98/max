      description: |-
        Resize an assistant's machine size and/or workspace PVC.

        Pro-gated and bounded by the org's purchased machine/storage tiers.
        Either dimension may be supplied independently; storage grows only
        (never shrinks). The actual vembda mechanics live in the policy-free
        ``resize_assistant`` helper — this view owns the entitlement and
        per-tier ceiling policy.
