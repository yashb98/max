      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - assistants
      security:
      - VellumAPIKey: []
      - SDKCompatibleAssistantKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '204':
          description: No response body
      x-vellum-api-clients:
