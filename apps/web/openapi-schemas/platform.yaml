          format: uuid
        required: true
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      tags:
      - assistants
      security:
      - VellumAPIKey: []
      - SDKCompatibleAssistantKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAssistantDomainList'
          description: ''
      x-vellum-api-clients:
      - platform
    post:
      operationId: assistants_domains_create
      description: List, create, and delete domains for a specific assistant.
      parameters:
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - assistants
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssistantDomainRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateAssistantDomainRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateAssistantDomainRequest'
      security:
      - VellumAPIKey: []
      - SDKCompatibleAssistantKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssistantDomain'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
      x-vellum-api-clients:
      - platform
  /v1/assistants/{assistant_id}/domains/{id}/:
    delete:
      operationId: assistants_domains_destroy
      description: List, create, and delete domains for a specific assistant.
      parameters:
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - assistants
      security:
      - VellumAPIKey: []
      - SDKCompatibleAssistantKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '204':
          description: No response body
      x-vellum-api-clients:
      - platform
  /v1/assistants/{assistant_id}/email-addresses/:
