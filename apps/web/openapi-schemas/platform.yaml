openapi: 3.0.3
info:
  title: vellum-assistant-platform API
  version: 1.0.0 (v1)
  description: Documentation of API endpoints of vellum-assistant-platform
paths:
  /v1/admin/assistants/{assistant_id}/doctor/history/:
    get:
      operationId: admin_assistants_doctor_history_list
      description: List persisted Doctor sessions for any hosted assistant.
      parameters:
      - in: header
        name: Vellum-Organization-Id
        schema:
          type: string
          format: uuid
        description: Required if using Cookie-based or X-Session-Token authentication
          methods.
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDoctorSessionListList'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
      x-vellum-api-clients:
      - platform
  /v1/admin/assistants/{assistant_id}/doctor/history/{doctor_session_id}/:
    get:
      operationId: admin_assistants_doctor_history_retrieve
      description: Return a persisted Doctor session for any hosted assistant.
      parameters:
      - in: header
        name: Vellum-Organization-Id
        schema:
          type: string
          format: uuid
        description: Required if using Cookie-based or X-Session-Token authentication
          methods.
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: doctor_session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorSessionDetail'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
      x-vellum-api-clients:
      - platform
  /v1/assistants/:
    get:
      operationId: assistants_list
      parameters:
      - in: header
        name: Vellum-Organization-Id
        schema:
          type: string
          format: uuid
        description: Required if using Cookie-based or X-Session-Token authentication
          methods.
      - in: query
        name: hosting
        schema:
          type: string
          enum:
          - all
          - local
          - platform
          default: platform
        description: Filter assistants by hosting mode. 'platform' (default) returns
          only platform-managed assistants. 'local' returns only self-hosted local
          assistants. 'all' returns both.
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      tags:
      - assistants
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      - AssistantAPIKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAssistantList'
          description: ''
      x-vellum-api-clients:
      - platform
  /v1/assistants/{assistant_id}/backups/:
    get:
      operationId: assistants_backups_retrieve
      description: List backups and trigger manual point-in-time backups for an assistant.
      parameters:
      - in: header
        name: Vellum-Organization-Id
        schema:
          type: string
          format: uuid
        description: Required if using Cookie-based or X-Session-Token authentication
          methods.
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - assistants
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
      x-vellum-api-clients:
      - platform
    post:
      operationId: assistants_backups_create
      description: Trigger a manual point-in-time backup for the assistant.
      parameters:
      - in: header
        name: Vellum-Organization-Id
        schema:
          type: string
          format: uuid
        description: Required if using Cookie-based or X-Session-Token authentication
          methods.
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - assistants
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
      x-vellum-api-clients:
      - platform
  /v1/assistants/{assistant_id}/backups/{snapshot_name}/restore/:
    post:
      operationId: assistants_backups_restore_create
      description: |-
        Restore an assistant from a named backup snapshot.

        Enforces ownership and verifies the snapshot belongs to the requested
        assistant by listing backups first.  Restore is never attempted if the
        snapshot is absent from the list.
      parameters:
      - in: header
        name: Vellum-Organization-Id
        schema:
          type: string
          format: uuid
        description: Required if using Cookie-based or X-Session-Token authentication
          methods.
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: snapshot_name
        schema:
          type: string
        required: true
      tags:
      - assistants
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
      x-vellum-api-clients:
      - platform
  /v1/assistants/{assistant_id}/doctor/history/:
    get:
      operationId: assistants_doctor_history_list
      description: |-
        List persisted Doctor sessions for an assistant, newest first.

        Sessions are scoped to the assistant identified by ``assistant_id``
        (ownership/auth is enforced by ``_DoctorAPIView`` via
        ``self.get_object()``). Results are ordered by
        ``last_message_at DESC NULLS LAST, -created`` so that the most
        recently active session appears first and sessions that have
        never received a message sink to the bottom (PostgreSQL defaults
        ``DESC`` to ``NULLS FIRST``, which would otherwise float empty
        sessions above active ones). An annotated ``message_count`` is
        included on each row so list views do not need a per-row query
        to display the message tally.
      parameters:
      - in: header
        name: Vellum-Organization-Id
        schema:
          type: string
          format: uuid
        description: Required if using Cookie-based or X-Session-Token authentication
          methods.
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      tags:
      - assistants
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDoctorSessionListList'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
      x-vellum-api-clients:
      - platform
  /v1/assistants/{assistant_id}/doctor/history/{doctor_session_id}/:
    get:
      operationId: assistants_doctor_history_retrieve
      description: |-
        Return a single persisted Doctor session with its message ledger.

        Looks up the session by Django UUID PK *and* by assistant
        ownership; lookups across assistants always return 404, never 200.
        Messages are returned in ``sequence`` order.
      parameters:
      - in: header
        name: Vellum-Organization-Id
        schema:
          type: string
          format: uuid
        description: Required if using Cookie-based or X-Session-Token authentication
          methods.
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: doctor_session_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - assistants
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorSessionDetail'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
      x-vellum-api-clients:
      - platform
  /v1/assistants/{assistant_id}/domains/:
    get:
