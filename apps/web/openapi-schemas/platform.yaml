components:
  schemas:
    AccessConsent:
      type: object
      description: Serializer for the user-controlled admin log access consent toggle.
      properties:
        access_consented:
          type: boolean
          description: When True, Vellum admins may view the daemon log file (/workspace/data/logs/vellum.log)
            from this assistant pod for debugging. Defaults to False; the owner can
            revoke at any time.
      required:
      - access_consented
    AcknowledgeRequest:
      type: object
      description: Serializer for acknowledge/unacknowledge actions.
      properties:
        acknowledged:
          type: boolean
      required:
      - acknowledged
    AcknowledgeResponse:
      type: object
      description: Response serializer for acknowledge/unacknowledge actions.
      properties:
        id:
          type: string
          format: uuid
        is_read:
          type: boolean
        read_at:
          type: string
          format: date-time
          nullable: true
      required:
      - id
      - is_read
      - read_at
    ApnsEnvironmentEnum:
      enum:
      - production
      - development
      type: string
      description: |-
        * `production` - production
        * `development` - development
    Assistant:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        handle:
          type: string
          readOnly: true
        description:
          type: string
          nullable: true
        configuration: {}
        status:
          $ref: '#/components/schemas/AssistantStatusEnum'
        created:
          type: string
          format: date-time
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
        release_channel:
          allOf:
          - $ref: '#/components/schemas/ReleaseChannelEnum'
          readOnly: true
        current_release_version:
          type: string
          nullable: true
          readOnly: true
        machine_id:
          type: string
          nullable: true
          maxLength: 255
        vembda_cluster_id:
          type: string
          readOnly: true
          nullable: true
        machine_size:
          readOnly: true
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/MachineSizeEnum'
          - $ref: '#/components/schemas/NullEnum'
        maintenance_mode:
          allOf:
          - $ref: '#/components/schemas/MaintenanceMode'
          readOnly: true
        is_local:
          type: boolean
          readOnly: true
        ingress_url:
          type: string
          nullable: true
          readOnly: true
        access_consented:
          type: boolean
          readOnly: true
      required:
      - access_consented
      - created
      - current_release_version
      - handle
      - id
      - ingress_url
      - is_local
      - machine_size
      - maintenance_mode
      - modified
      - release_channel
      - vembda_cluster_id
    AssistantDomain:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        subdomain:
          type: string
          description: Subdomain label (e.g. 'velly')
          maxLength: 63
        created:
          type: string
          format: date-time
          readOnly: true
        modified:
          type: string
          format: date-time
          readOnly: true
      required:
      - created
      - id
      - modified
      - subdomain
    AssistantEmailAddress:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        address:
          type: string
          format: email
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - address
      - created_at
      - id
    AssistantHandleAvailability:
      type: object
      description: |-
        Response shape for the live assistant-handle availability check.

        * ``available``: ``true`` only when the handle passes format validation
          AND no other assistant holds it (case-insensitively).
        * ``code``: ``null`` when ``available`` is ``true``; otherwise a stable
          machine-readable reason — either a validation code from
          :mod:`app.assistant.handle_validation` or ``"taken"``.
      properties:
        available:
          type: boolean
        code:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
      required:
      - available
    AssistantRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          nullable: true
        configuration: {}
        status:
          $ref: '#/components/schemas/AssistantStatusEnum'
        machine_id:
          type: string
          nullable: true
          maxLength: 255
    AssistantResize403:
      oneOf:
      - $ref: '#/components/schemas/AssistantResizeTierError'
      - $ref: '#/components/schemas/DetailResponse'
    AssistantResizeRequestRequest:
      type: object
      properties:
        machine_size:
          type: string
          minLength: 1
        storage_gib:
          type: integer
          minimum: 1
    AssistantResizeResponse:
      type: object
      properties:
        machine_size:
          type: string
          nullable: true
        provisioned_storage_gib:
          type: integer
          nullable: true
      required:
      - machine_size
      - provisioned_storage_gib
    AssistantResizeTierError:
      type: object
      description: |-
        403 body returned when a resize request exceeds a purchased tier.

        Two flavors share this shape: ``exceeds_machine_tier`` (with
        ``max_machine_tier``) and ``exceeds_storage_tier`` (with ``max_storage_gib``).
        The non-applicable ceiling field is omitted per branch, so both are optional
        and nullable. Distinct from the Pro-gate 403, which returns ``{detail}``.
      properties:
        error:
          type: string
        max_machine_tier:
          type: string
          nullable: true
        max_storage_gib:
          type: integer
          nullable: true
      required:
      - error
    AssistantStatusEnum:
      enum:
      - initializing
      - active
      - to_be_deleted
      type: string
      description: |-
        * `initializing` - Initializing
        * `active` - Active
        * `to_be_deleted` - To be deleted
    AssistantSystemEvent:
      type: object
      description: |-
        List-item serializer for AssistantSystemEvent.

        Exposes only the fields that the web and admin UIs need.  ``display_text``
        is derived from ``details`` at read time so that the stored schema can
        evolve without migrations.

        ``idle_timeout_seconds`` is read from the event's ``details`` payload
        where it was stored at record time.  ``None`` for non-idle_sleep events
        or events recorded before this field was persisted.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        type:
          allOf:
          - $ref: '#/components/schemas/SystemEventTypeEnum'
          readOnly: true
          description: |-
            High-level categorisation of what occurred.

            * `lifecycle` - Lifecycle
            * `upgrade` - Upgrade
            * `rollback` - Rollback
            * `crash` - Crash
            * `idle_sleep` - Idle Sleep
            * `wake` - Wake
            * `profiler` - Profiler
            * `other` - Other
        event_status:
          allOf:
          - $ref: '#/components/schemas/EventStatusEnum'
          readOnly: true
          description: |-
            Outcome or phase of the event.

            * `started` - Started
            * `succeeded` - Succeeded
            * `failed` - Failed
            * `in_progress` - In Progress
        source:
          allOf:
          - $ref: '#/components/schemas/SourceEnum'
          readOnly: true
          description: |-
            Component that produced the event.

            * `django` - Django
            * `vembda` - Vembda
        reason:
          type: string
          readOnly: true
          description: Short machine-readable reason code or message.
        display_text:
          type: string
          readOnly: true
        details:
          readOnly: true
          description: Structured event payload. Derive display text from this field.
        occurred_at:
          type: string
          format: date-time
          readOnly: true
          description: When the event actually occurred (caller-supplied).
        idle_timeout_seconds:
          type: integer
          nullable: true
          readOnly: true
      required:
      - details
      - display_text
      - event_status
      - id
      - idle_timeout_seconds
      - occurred_at
      - reason
      - source
      - type
    AutoTopUpConfigRequestRequest:
      type: object
      description: PUT /…/auto-top-up/ request body.
      properties:
        enabled:
          type: boolean
        threshold_usd:
          type: string
          minLength: 1
        amount_usd:
          type: string
          minLength: 1
        monthly_cap_usd:
          type: string
          nullable: true
          minLength: 1
      required:
      - amount_usd
      - enabled
      - monthly_cap_usd
      - threshold_usd
    AutoTopUpConfigResponse:
      type: object
      description: GET /…/auto-top-up/ response shape; also returned by PUT.
      properties:
        enabled:
          type: boolean
        threshold_usd:
          type: string
          nullable: true
        amount_usd:
          type: string
          nullable: true
        monthly_cap_usd:
          type: string
          nullable: true
        has_payment_method:
          type: boolean
