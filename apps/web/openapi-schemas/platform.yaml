          - discord
          - dropbox
          - github
          - google
          - hubspot
          - linear
          - notion
          - outlook
          - salesforce
          - todoist
          - twitter
        description: Filter connections by OAuth provider.
      - in: query
        name: status
        schema:
          type: string
          enum:
