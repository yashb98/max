                  - destinations
                additionalProperties: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  minLength: 1
                  description: Absolute path to the destination directory
                encrypt:
                  description: Encrypt snapshots at this destination (default true)
                  type: boolean
              required:
                - path
              additionalProperties: false
  /v1/backup/destinations/remove:
    post:
      operationId: backup_destinations_remove_post
      summary: Remove an offsite backup destination
      description: Removes the destination matching the given path. Errors if no matching destination exists.
      tags:
        - backups
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  destinations:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                        encrypt:
                          type: boolean
                      required:
                        - path
                        - encrypt
                      additionalProperties: false
                required:
                  - destinations
                additionalProperties: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  minLength: 1
                  description: Exact path match of the destination to remove
              required:
                - path
              additionalProperties: false
