                  type: string
                  description: Source channel (token-based)
                assistantId:
                  type: string
                  description: Assistant ID (voice-code)
              required:
                - token
                - code
                - callerExternalUserId
                - externalUserId
                - externalChatId
                - sourceChannel
                - assistantId
              additionalProperties: false
