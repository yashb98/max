    post:
      operationId: backup_destinations_setencrypt_post
      summary: Toggle encryption for an existing destination
      description: Updates the encrypt flag for a destination. Errors if no destination with the given path exists.
      tags:
        - backups
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  destination:
                    type: object
                    properties:
                      path:
                        type: string
                      encrypt:
                        type: boolean
                    required:
                      - path
                      - encrypt
                    additionalProperties: false
                required:
                  - destination
                additionalProperties: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  minLength: 1
                  description: Exact path match of an existing destination
                encrypt:
                  type: boolean
                  description: true to encrypt future snapshots, false for plaintext
              required:
                - path
                - encrypt
              additionalProperties: false
  /v1/backup/disable:
    post:
      operationId: backup_disable_post
      summary: Disable automated backups
      description: Sets backup.enabled = false. Existing snapshots are untouched.
      tags:
        - backups
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    const: false
                required:
                  - enabled
                additionalProperties: false
  /v1/backup/enable:
    post:
      operationId: backup_enable_post
      summary: Enable automated backups
      description: Sets backup.enabled = true. Optionally overrides intervalHours (1-168), retention (1-100), and offsiteEnabled.
      tags:
        - backups
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                intervalHours:
                  type: integer
                  minimum: 1
                  maximum: 168
                retention:
                  type: integer
                  minimum: 1
                  maximum: 100
                offsiteEnabled:
                  type: boolean
              additionalProperties: false
  /v1/backup/status:
    get:
      operationId: backup_status_get
      summary: Show backup status and next-run timing
      description:
        Reports enabled/disabled state, interval and retention, last-run and next-run timing from the
        backup:last_run_at checkpoint, local snapshot count, and per-destination reachability and snapshot counts. When
        `backup.offsite.enabled` is false the `offsite` array is empty and `offsiteEnabled` is false.
      tags:
        - backups
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  intervalHours:
                    type: number
                  retention:
                    type: number
                  lastRunAt:
                    anyOf:
                      - type: string
                      - type: "null"
                  nextRunAt:
                    anyOf:
                      - type: string
                      - type: "null"
                  localDir:
                    type: string
                  localSnapshotCount:
                    type: number
                  offsiteEnabled:
                    type: boolean
                  offsite:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                        encrypt:
                          type: boolean
                        reachable:
                          type: boolean
                        snapshotCount:
                          type: number
                      required:
                        - path
                        - encrypt
                        - reachable
                        - snapshotCount
                      additionalProperties: false
                required:
                  - enabled
                  - intervalHours
                  - retention
                  - lastRunAt
                  - nextRunAt
                  - localDir
                  - localSnapshotCount
                  - offsiteEnabled
                  - offsite
                additionalProperties: false
  /v1/backups:
    get:
      operationId: backups_get
      summary: List backup snapshots
      description:
        Lists local and offsite backup snapshots. Each offsite destination includes a `reachable` flag reflecting
        whether the backing volume is currently available. When `backup.offsite.enabled` is false the `offsite` array is
        empty and `offsiteEnabled` is false — clients should gate offsite UI on `offsiteEnabled` rather than
        `offsite.length`.
      tags:
        - backups
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  local:
                    type: array
                    items: {}
                  offsite:
                    type: array
                    items:
                      type: object
                      properties:
                        destination:
                          type: object
                          properties: {}
                          additionalProperties: {}
                        snapshots:
                          type: array
                          items: {}
                        reachable:
                          type: boolean
                      required:
                        - destination
                        - snapshots
                        - reachable
                      additionalProperties: false
                  offsiteEnabled:
                    type: boolean
                  nextRunAt:
                    anyOf:
                      - type: string
                      - type: "null"
                required:
                  - local
                  - offsite
                  - offsiteEnabled
                  - nextRunAt
                additionalProperties: false
  /v1/backups/create:
    post:
      operationId: backups_create_post
      summary: Create a backup snapshot immediately
      description:
        Trigger a manual snapshot. Bypasses the enabled and interval gates, but honors the in-progress mutex — a
        concurrent caller receives 409.
      tags:
        - backups
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  local:
                    type: object
                    properties: {}
                    additionalProperties: {}
                  offsite:
                    type: array
                    items: {}
                  durationMs:
                    type: number
                required:
                  - local
                  - offsite
                  - durationMs
                additionalProperties: false
  /v1/backups/restore:
    post:
      operationId: backups_restore_post
      summary: Restore from a backup snapshot
      description:
        "Restores a snapshot into the workspace. Destructive: the underlying commit flow backs up existing files
        before overwriting. The daemon closes the live SQLite handle before writing and invalidates its config/trust
        caches afterwards. Credentials are NOT included — users re-authenticate integrations after a restore."
      tags:
        - backups
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  manifest:
                    type: object
                    properties: {}
                    additionalProperties: {}
                  restoredFiles:
                    type: number
                required:
                  - manifest
                  - restoredFiles
                additionalProperties: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  description: Absolute path to the snapshot file to restore
              required:
                - path
              additionalProperties: false
  /v1/backups/verify:
    post:
      operationId: backups_verify_post
      summary: Verify a backup snapshot
      description:
        Validates a snapshot without restoring. Decrypts encrypted bundles to a temp file, runs the vbundle
        validator, and returns a pass/fail status.
      tags:
        - backups
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  manifest:
                    type: object
                    properties: {}
                    additionalProperties: {}
                  error:
                    type: string
                required:
                  - valid
                additionalProperties: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  description: Absolute path to the snapshot file to verify
              required:
                - path
              additionalProperties: false
  /v1/bookmarks:
    get:
      operationId: bookmarks_get
      summary: List bookmarks
      description: Return all bookmarks (newest first), joined with their parent message and conversation.
      tags:
        - bookmarks
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookmarks:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        messageId:
                          type: string
                        conversationId:
                          type: string
                        conversationTitle:
                          anyOf:
                            - type: string
                            - type: "null"
