                    anyOf:
                      - type: string
                      - type: "null"
                  messagePreview:
                    type: string
                  messageRole:
                    type: string
                  messageCreatedAt:
                    type: number
                  createdAt:
                    type: number
                required:
                  - id
                  - messageId
                  - conversationId
                  - conversationTitle
                  - messagePreview
                  - messageRole
                  - messageCreatedAt
                  - createdAt
                additionalProperties: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messageId:
                  type: string
                conversationId:
                  type: string
              required:
                - messageId
                - conversationId
              additionalProperties: false
