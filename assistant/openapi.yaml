  /v1/conversations/{id}/inference-profile:
    put:
      operationId: conversations_by_id_inferenceprofile_put
      summary: Set conversation inference profile
      description:
        Override the LLM inference profile for a single conversation. Optionally supply ttlSeconds to create a
        session-backed (expiring) override.
      tags:
        - conversations
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversationId:
                    type: string
                  profile:
                    anyOf:
                      - type: string
                      - type: "null"
                  sessionId:
                    anyOf:
                      - type: string
                      - type: "null"
                  expiresAt:
                    anyOf:
                      - type: number
                      - type: "null"
                  ttlSeconds:
                    anyOf:
                      - type: number
                      - type: "null"
                  replaced:
                    anyOf:
                      - type: object
                        properties:
                          profile:
                            anyOf:
                              - type: string
                              - type: "null"
                          sessionId:
                            anyOf:
                              - type: string
                              - type: "null"
                          expiresAt:
                            anyOf:
                              - type: number
                              - type: "null"
                        required:
                          - profile
                          - sessionId
                          - expiresAt
                        additionalProperties: false
                      - type: "null"
                required:
                  - conversationId
                  - profile
                  - sessionId
                  - expiresAt
                  - replaced
                additionalProperties: false
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                profile:
                  anyOf:
                    - type: string
                    - type: "null"
                ttlSeconds:
                  anyOf:
                    - type: number
                      exclusiveMinimum: 0
                    - type: "null"
                sessionId:
                  type: string
                  format: uuid
                  pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
              required:
                - profile
              additionalProperties: false
