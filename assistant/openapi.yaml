                          - unknown
                      locked:
                        type: boolean
                      acknowledged:
                        type: boolean
                      overrideActive:
                        type: boolean
                      effectivelyLocked:
                        type: boolean
                      lockId:
                        anyOf:
                          - type: string
                          - type: "null"
                      usagePercent:
                        anyOf:
                          - type: number
                          - type: "null"
                      thresholdPercent:
                        type: number
                      path:
                        anyOf:
                          - type: string
                          - type: "null"
                      lastCheckedAt:
                        anyOf:
                          - type: string
                          - type: "null"
                      blockedCapabilities:
                        type: array
                        items:
                          type: string
                          enum:
                            - agent-turns
                            - background-work
                            - remote-ingress
                      error:
                        anyOf:
                          - type: string
                          - type: "null"
                    required:
                      - enabled
                      - state
                      - locked
                      - acknowledged
                      - overrideActive
                      - effectivelyLocked
                      - lockId
                      - usagePercent
                      - thresholdPercent
                      - path
                      - lastCheckedAt
                      - blockedCapabilities
                      - error
                    additionalProperties: false
                required:
                  - status
                additionalProperties: false
