                      data: {}
                    required:
                      - data
                    additionalProperties: false
                  - type: "null"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                key:
                  type: string
                  minLength: 1
              required:
                - key
              additionalProperties: false
  /v1/cache/set:
    post:
      operationId: cache_set_post
      summary: Set a cache entry
      description: Store a value in the daemon's in-memory cache, optionally with a TTL.
      tags:
        - cache
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                required:
                  - key
