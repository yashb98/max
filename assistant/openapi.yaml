  /v1/conversations/inference-profile-session:
    post:
      operationId: conversations_inferenceprofilesession_post
      summary: Open an inference-profile session
      description:
        Open (or replace) a session-backed inference-profile override for a conversation. Supports an optional TTL
        — omit for a sticky (non-expiring) override.
      tags:
        - conversations
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversationId:
                    type: string
                  profile:
                    anyOf:
                      - type: string
                      - type: "null"
                  sessionId:
                    anyOf:
                      - type: string
                      - type: "null"
                  expiresAt:
                    anyOf:
                      - type: number
                      - type: "null"
                  ttlSeconds:
                    anyOf:
                      - type: number
                      - type: "null"
                  replaced:
                    anyOf:
                      - type: object
                        properties:
                          profile:
                            anyOf:
                              - type: string
                              - type: "null"
                          sessionId:
                            anyOf:
                              - type: string
                              - type: "null"
                          expiresAt:
                            anyOf:
                              - type: number
                              - type: "null"
                        required:
                          - profile
                          - sessionId
                          - expiresAt
                        additionalProperties: false
                      - type: "null"
                required:
                  - conversationId
                  - profile
                  - sessionId
                  - expiresAt
                  - replaced
                additionalProperties: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversationId:
                  type: string
                  minLength: 1
                profile:
                  type: string
                  minLength: 1
                ttlSeconds:
                  anyOf:
                    - type: number
                      exclusiveMinimum: 0
                    - type: "null"
                sessionId:
                  type: string
                  format: uuid
                  pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000|ffffffff-ffff-ffff-ffff-ffffffffffff)$
              required:
                - conversationId
                - profile
              additionalProperties: false
  /v1/conversations/inference-profile-session/close:
    post:
      operationId: conversations_inferenceprofilesession_close_post
      summary: Close an inference-profile session
      description:
        Close the active session-backed inference-profile override for a conversation. Only closes session-backed
        overrides; sticky overrides are left untouched.
      tags:
        - conversations
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversationId:
                    type: string
                  closed:
                    anyOf:
                      - type: object
                        properties:
                          profile:
                            anyOf:
                              - type: string
                              - type: "null"
                          sessionId:
                            anyOf:
                              - type: string
                              - type: "null"
                        required:
                          - profile
                          - sessionId
                        additionalProperties: false
                      - type: "null"
                  noop:
                    type: boolean
                required:
                  - conversationId
                  - closed
                  - noop
                additionalProperties: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                conversationId:
                  type: string
                  minLength: 1
              required:
                - conversationId
              additionalProperties: false
