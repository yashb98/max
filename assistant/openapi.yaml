    post:
      operationId: questionresponse_post
      summary: Resolve a pending ask-question prompt
      description:
        Submit the user's batched response (or close the card) for a pending question prompt by requestId. Legacy
        single-question payloads remain accepted as syntactic sugar for a one-element batch.
      tags:
        - approvals
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
                additionalProperties: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  properties:
                    requestId:
                      type: string
                    kind:
                      type: string
                      const: submit
                    responses:
                      minItems: 1
                      type: array
                      items:
                        oneOf:
                          - type: object
                            properties:
                              questionId:
                                type: string
                              kind:
                                type: string
                                const: option
                              optionId:
                                type: string
                            required:
                              - questionId
                              - kind
                              - optionId
                            additionalProperties: false
                          - type: object
                            properties:
                              questionId:
                                type: string
                              kind:
                                type: string
                                const: free_text
                              text:
                                type: string
                            required:
                              - questionId
                              - kind
                              - text
                            additionalProperties: false
                          - type: object
                            properties:
                              questionId:
                                type: string
                              kind:
                                type: string
                                const: skip
                            required:
                              - questionId
                              - kind
                            additionalProperties: false
                  required:
                    - requestId
                    - kind
                    - responses
                  additionalProperties: false
                - type: object
                  properties:
                    requestId:
                      type: string
                    kind:
                      type: string
                      const: close
                  required:
                    - requestId
                    - kind
                  additionalProperties: false
                - type: object
                  properties:
                    requestId:
                      type: string
                    kind:
                      type: string
                      const: option
                    optionId:
                      type: string
                  required:
                    - requestId
                    - kind
                    - optionId
                  additionalProperties: false
                - type: object
                  properties:
                    requestId:
                      type: string
                    kind:
                      type: string
                      const: free_text
                    text:
                      type: string
                  required:
                    - requestId
                    - kind
                    - text
                  additionalProperties: false
