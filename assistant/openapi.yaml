        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  destinations:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                        encrypt:
                          type: boolean
                      required:
                        - path
                        - encrypt
                      additionalProperties: false
                required:
                  - destinations
                additionalProperties: false
  /v1/backup/destinations/add:
    post:
      operationId: backup_destinations_add_post
      summary: Add an offsite backup destination
      description:
        Appends a new destination. Materializes the iCloud default first if destinations is currently null. Errors
        if the path already exists.
      tags:
        - backups
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  destinations:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                        encrypt:
                          type: boolean
