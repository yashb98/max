          IMAGE="${{ steps.tags.outputs.gcp_image }}"
          TAG_ARGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS="$TAG_ARGS -t $tag"
          done <<< "${{ steps.tags.outputs.gcp_tags }}"
          SOURCES=$(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create $TAG_ARGS $SOURCES

      - name: Export manifest digest
        id: manifest-digest
        run: |
          IMAGE="${{ steps.tags.outputs.gcp_image }}"
          VERSION="${{ needs.compute-version.outputs.version }}"
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          mkdir -p /tmp/manifest-digest
          echo "${DIGEST}" > /tmp/manifest-digest/digest

      - name: Upload manifest digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: credential-executor-manifest-digest-dev
          path: /tmp/manifest-digest/digest
          retention-days: 1

  # ── Register Release with Dev Platform ─────────────────────────────────

  register-release:
    needs: [compute-version, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2


      - name: Download manifest digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: '*-manifest-digest-dev'
          path: /tmp/digests

      - name: Extract manifest digests
        id: digests
        run: |
          echo "assistant_digest=$(cat /tmp/digests/assistant-manifest-digest-dev/digest)" >> "$GITHUB_OUTPUT"
          echo "gateway_digest=$(cat /tmp/digests/gateway-manifest-digest-dev/digest)" >> "$GITHUB_OUTPUT"
          echo "credential_executor_digest=$(cat /tmp/digests/credential-executor-manifest-digest-dev/digest)" >> "$GITHUB_OUTPUT"

      - name: Register release with platform
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          SHA="${GITHUB_SHA}"
          ASSISTANT_REPO="${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ASSISTANT_IMAGE_NAME }}"
          GATEWAY_REPO="${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GATEWAY_IMAGE_NAME }}"
          CREDENTIAL_EXECUTOR_REPO="${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.CREDENTIAL_EXECUTOR_IMAGE_NAME }}"

          PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --arg released_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson is_stable true \
            --arg assistant_repo "$ASSISTANT_REPO" \
            --arg assistant_tag "${VERSION}" \
            --arg assistant_sha "$SHA" \
            --arg assistant_digest "${{ steps.digests.outputs.assistant_digest }}" \
            --arg gateway_repo "$GATEWAY_REPO" \
            --arg gateway_tag "${VERSION}" \
            --arg gateway_sha "$SHA" \
            --arg gateway_digest "${{ steps.digests.outputs.gateway_digest }}" \
            --arg credential_executor_repo "$CREDENTIAL_EXECUTOR_REPO" \
            --arg credential_executor_tag "${VERSION}" \
            --arg credential_executor_sha "$SHA" \
            --arg credential_executor_digest "${{ steps.digests.outputs.credential_executor_digest }}" \
            '{
              version: $version,
              released_at: $released_at,
              is_stable: $is_stable,
              assistant_image: {
                repository: $assistant_repo,
                tag: $assistant_tag,
                sha: $assistant_sha,
                digest: $assistant_digest
              },
              gateway_image: {
                repository: $gateway_repo,
                tag: $gateway_tag,
                sha: $gateway_sha,
                digest: $gateway_digest
              },
              credential_executor_image: {
                repository: $credential_executor_repo,
                tag: $credential_executor_tag,
                sha: $credential_executor_sha,
                digest: $credential_executor_digest
              }
            }')

          DELAYS=(5 15 30)
          MAX_ATTEMPTS=3

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            CURL_EXIT=0
            echo "Registering dev release ${VERSION} [attempt ${attempt}/${MAX_ATTEMPTS}]..."
            HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              -X POST "${{ secrets.PLATFORM_API_URL }}/v1/internal/assistant-image-releases/" \
              -H "Content-Type: application/json" \
              -H "X-Internal-Service-Api-Key: ${{ secrets.PLATFORM_INTERNAL_SERVICE_API_KEY }}" \
              -d "$PAYLOAD") || CURL_EXIT=$?

            if [ "${CURL_EXIT:-0}" -ne 0 ]; then
              echo "::warning::curl transport error (exit code $CURL_EXIT)"
              HTTP_STATUS="000"
            else
              echo "HTTP Status: $HTTP_STATUS"
              cat /tmp/response.json
            fi

            if [ "$HTTP_STATUS" -ge 200 ] 2>/dev/null && [ "$HTTP_STATUS" -lt 300 ] 2>/dev/null; then
              echo "Registration succeeded"
              exit 0
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              DELAY=${DELAYS[$((attempt - 1))]}
              echo "::warning::Attempt ${attempt} failed (HTTP $HTTP_STATUS). Retrying in ${DELAY}s..."
              sleep "$DELAY"
            else
              echo "::error::Release registration failed after ${MAX_ATTEMPTS} attempts (last HTTP $HTTP_STATUS)"
              exit 1
            fi
          done

  # ── Chrome Extension ────────────────────────────────────────────────────

  build-chrome-extension:
    needs: [compute-version]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        working-directory: clients/chrome-extension
        run: bun install --frozen-lockfile

      - name: Build extension
        working-directory: clients/chrome-extension
        env:
          VERSION: ${{ needs.compute-version.outputs.version }}
          VELLUM_ENVIRONMENT: dev
        run: bash build.sh

      - name: Upload extension zip
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dev-chrome-extension
          path: clients/chrome-extension/vellum-browser-relay.zip
          retention-days: 30

  # ── macOS DMG ──────────────────────────────────────────────────────────

  build-macos:
    needs: [compute-version, ci-assistant, ci-gateway, ci-credential-executor]
    runs-on: macos-15
    timeout-minutes: 45
    defaults:
      run:
        working-directory: clients/macos
    env:
      KEYCHAIN_NAME: build.keychain
      KEYCHAIN_PASSWORD: temporary-ci-password
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Import code-signing certificate
        env:
          CERT_P12: ${{ secrets.DEVID_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERT_P12" | base64 -D > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          rm /tmp/certificate.p12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Verify signing identity
        run: |
          security find-identity -v -p codesigning | grep -q "Developer ID Application" \
            || { echo "::error::Developer ID Application identity not found"; exit 1; }

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install nested package dependencies
        working-directory: .
        run: |
          for dir in packages/*/ skills/*/; do
            [ -f "${dir}/package.json" ] || continue
            (cd "${dir}" && bun install --frozen-lockfile 2>/dev/null || bun install)
          done

      - name: Build binaries
        run: |
          DISPLAY_VERSION="${{ needs.compute-version.outputs.version }}" \
          COMMIT_SHA="${{ github.sha }}" \
          ./build.sh binaries

      - name: Compute build version
        id: version
        run: |
          BUILD_VERSION=$(date -u +%Y%m%d%H%M)
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "Build version: $BUILD_VERSION"

      - name: Build macOS app
        timeout-minutes: 20
        run: |
          set -o pipefail
          SKIP_BUN_REBUILD=1 \
          BUNDLE_DISPLAY_NAME="Vellum Dev" \
          DISPLAY_VERSION="${{ needs.compute-version.outputs.version }}" \
          BUILD_VERSION="${{ steps.version.outputs.build_version }}" \
          COMMIT_SHA="${{ github.sha }}" \
          VELLUM_ENVIRONMENT=dev \
          SU_PUBLIC_ED_KEY="${{ secrets.SPARKLE_ED_PUBLIC_KEY }}" \
          SU_FEED_URL="https://storage.googleapis.com/vellum-nonprod-sparkle/dev/appcast.xml" \
          SIGN_IDENTITY="Developer ID Application" \
          RELEASE_ARCH_FLAGS="--arch arm64" \
          ./build.sh release 2>&1 | while IFS= read -r line; do
            echo "[$(date -u '+%H:%M:%S')] $line"
          done

      - name: Free disk space
        run: |
          rm -rf .build daemon-bin assistant-bin cli-bin gateway-bin ces-bin
          rm -rf ../../assistant/node_modules ../../cli/node_modules ../../gateway/node_modules ../../credential-executor/node_modules
          rm -rf ~/Library/Developer/Xcode/DerivedData 2>/dev/null || true
          df -h .

      - name: Cache Homebrew create-dmg
        id: cache-create-dmg
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            /usr/local/Cellar/create-dmg
            /opt/homebrew/Cellar/create-dmg
          key: create-dmg-v1-${{ runner.os }}-${{ runner.arch }}

      - name: Install create-dmg
        if: steps.cache-create-dmg.outputs.cache-hit != 'true'
        run: brew install create-dmg

      - name: Link create-dmg
        if: steps.cache-create-dmg.outputs.cache-hit == 'true'
        run: brew link create-dmg 2>/dev/null || true

      - name: Create DMG
        run: |
          DMG_STAGING="build/dmg-staging"
          mkdir -p "$DMG_STAGING" build
          cp -R "dist/Vellum Dev.app" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          create-dmg \
            --volname "Vellum Dev" \
            --background "dmg/dmg-background@2x.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --text-size 10 \
            --icon "Vellum Dev.app" 175 190 \
            --icon "Applications" 530 190 \
            --hide-extension "Vellum Dev.app" \
            --no-internet-enable \
            "build/vellum-assistant-dev.dmg" \
            "$DMG_STAGING/" \
          || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 2 ] && [ -f "build/vellum-assistant-dev.dmg" ]; then
              echo "create-dmg exited with warning (code 2), but DMG was created"
            else
              exit $EXIT_CODE
            fi
          }
          ls -lh "build/vellum-assistant-dev.dmg"

      - name: Sign DMG
        run: |
          codesign --sign "Developer ID Application" --timestamp "build/vellum-assistant-dev.dmg"
          codesign --verify --verbose "build/vellum-assistant-dev.dmg"

      - name: Notarize DMG
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_P8" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

          echo "Submitting DMG for notarization..."
          NOTARIZE_OUTPUT=$(xcrun notarytool submit "build/vellum-assistant-dev.dmg" \
            --key ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait \
            --timeout 30m \
            2>&1) || NOTARIZE_FAILED=true

          echo "$NOTARIZE_OUTPUT"

          SUBMISSION_ID=$(echo "$NOTARIZE_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

          if [ "$NOTARIZE_FAILED" = "true" ] || echo "$NOTARIZE_OUTPUT" | grep -q "status: Invalid"; then
            echo "::error::Notarization failed"
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --key ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
                --key-id "$ASC_KEY_ID" \
                --issuer "$ASC_ISSUER_ID" \
                || echo "::warning::Could not fetch notarization log"
            fi
            exit 1
          fi

      - name: Staple notarization ticket
        run: |
          MAX_ATTEMPTS=10
          WAIT_SECS=30
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STAPLE_OUTPUT=$(xcrun stapler staple "build/vellum-assistant-dev.dmg" 2>&1)
            STAPLE_EXIT=$?
            if [ $STAPLE_EXIT -eq 0 ]; then
              echo "Stapling succeeded on attempt $i"
              break
            fi
            echo "::warning::Stapling attempt $i/$MAX_ATTEMPTS failed"
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Stapling failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi
            sleep $WAIT_SECS
            WAIT_SECS=$((WAIT_SECS + 15))
          done
          xcrun stapler validate "build/vellum-assistant-dev.dmg"

      - name: Build ZIP for Sparkle auto-update
        run: |
          cd dist
          ditto -c -k --keepParent "Vellum Dev.app" vellum-assistant-dev.zip
          echo "Sparkle ZIP created:"
          ls -lh vellum-assistant-dev.zip

      - name: Cache Homebrew Sparkle
        id: cache-sparkle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            /usr/local/Caskroom/sparkle
            /opt/homebrew/Caskroom/sparkle
          key: sparkle-v1-${{ runner.os }}-${{ runner.arch }}

      - name: Install Sparkle sign_update tool
        run: |
          if [ "${{ steps.cache-sparkle.outputs.cache-hit }}" != "true" ]; then
            brew install sparkle
          fi
          SPARKLE_BIN=$(find /opt/homebrew/Caskroom/sparkle -name sign_update -type f 2>/dev/null | head -1)
          if [ -z "$SPARKLE_BIN" ]; then
            SPARKLE_BIN=$(find /usr/local/Caskroom/sparkle -name sign_update -type f 2>/dev/null | head -1)
          fi
          echo "Found sign_update at: $SPARKLE_BIN"
          echo "$(dirname "$SPARKLE_BIN")" >> "$GITHUB_PATH"

      - name: Generate appcast.xml
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          BUILD_VERSION="${{ steps.version.outputs.build_version }}"

          ED_KEY_FILE=$(mktemp)
          echo "$SPARKLE_ED_PRIVATE_KEY" > "$ED_KEY_FILE"
          SIGN_OUTPUT=$(sign_update dist/vellum-assistant-dev.zip --ed-key-file "$ED_KEY_FILE") || {
            echo "sign_update failed with exit code $?"
            rm -f "$ED_KEY_FILE"
            exit 1
          }
          rm -f "$ED_KEY_FILE"
          echo "sign_update output: ${SIGN_OUTPUT:0:40}..."
          SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          SIZE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')
          if [ -z "$SIGNATURE" ]; then
            echo "ERROR: Failed to parse edSignature from sign_update output"
            exit 1
          fi
          if [ -z "$SIZE" ]; then
            SIZE=$(stat -f%z dist/vellum-assistant-dev.zip)
          fi

          REPO="${{ github.repository }}"
          cat > dist/appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Vellum Dev</title>
              <item>
                <title>${VERSION}</title>
                <sparkle:version>${BUILD_VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <enclosure
                  url="https://storage.googleapis.com/vellum-nonprod-sparkle/dev/vellum-assistant-dev.zip"
                  sparkle:edSignature="${SIGNATURE}"
                  length="${SIZE}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF
          echo "Dev appcast generated (version=$VERSION, build=$BUILD_VERSION)"

      - name: Upload DMG
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dev-dmg
          path: clients/macos/build/vellum-assistant-dev.dmg
          retention-days: 30

      - name: Upload Sparkle artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dev-sparkle
          path: |
            clients/macos/dist/vellum-assistant-dev.zip
            clients/macos/dist/appcast.xml
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

  # ── Sparkle Rolling Release ────────────────────────────────────────────
  # ── Upload Sparkle artifacts to GCS ───────────────────────────────────
  # Push appcast.xml + ZIP to the public vellum-nonprod-sparkle GCS bucket.
  # Dev macOS builds have SUFeedURL pointing here, so Sparkle auto-updates
  # work without creating GitHub releases.

  upload-sparkle:
    needs: [compute-version, build-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: dev
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Sparkle artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dev-sparkle
          path: sparkle-artifacts

      - name: Download DMG
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dev-dmg
          path: dmg-artifacts

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Upload Sparkle artifacts to GCS
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          BUCKET="vellum-nonprod-sparkle"

          ZIP=$(find sparkle-artifacts -name "*.zip" -type f | head -1)
          APPCAST=$(find sparkle-artifacts -name "appcast.xml" -type f | head -1)
          DMG=$(find dmg-artifacts -name "*.dmg" -type f | head -1)

          if [ -z "$ZIP" ] || [ -z "$APPCAST" ]; then
            echo "::warning::Sparkle artifacts not found, skipping GCS upload"
            exit 0
          fi

          gcloud storage cp "$ZIP" "gs://${BUCKET}/dev/vellum-assistant-dev.zip"
          gcloud storage cp "$APPCAST" "gs://${BUCKET}/dev/appcast.xml"
          [ -n "$DMG" ] && gcloud storage cp "$DMG" "gs://${BUCKET}/dev/vellum-assistant-dev.dmg"

          echo "Uploaded Sparkle artifacts to gs://${BUCKET}/dev/ (version=${VERSION})"

  # ── Dispatch iOS release to platform repo ────────────────────────────

  dispatch-ios-release:
    needs: [compute-version, register-release, upload-sparkle, build-chrome-extension]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: dev
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: vellum-assistant-platform

      - name: Dispatch iOS release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          curl -fsSL \
            -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/vellum-ai/vellum-assistant-platform/dispatches" \
            -d "{\"event_type\":\"ios-release\",\"client_payload\":{\"environment\":\"dev\",\"version\":\"$VERSION\"}}"
          echo "Dispatched ios-release to vellum-assistant-platform (environment=dev, version=$VERSION)"

  # ── Slack notification (first failure only) ──────────────────────────

  notify-releases:
    name: Notify #releases on first failure
    needs: [ci-assistant, ci-gateway, ci-credential-executor]
    if: always()
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Determine if any CI job failed
        id: check
        run: |
          if [[ "${{ needs.ci-assistant.result }}" == "failure" || \
                "${{ needs.ci-gateway.result }}" == "failure" || \
                "${{ needs.ci-credential-executor.result }}" == "failure" ]]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if previous run succeeded (first-failure detection)
        id: previous
        if: steps.check.outputs.failed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch the most recent completed run before this one
          PREV=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/dev-release.yaml/runs?per_page=5&status=completed&exclude_pull_requests=true" \
            --jq "[.workflow_runs[] | select(.id != ${{ github.run_id }})] | .[0].conclusion" \
          )
          echo "Previous run conclusion: $PREV"
          if [ "$PREV" = "success" ]; then
            echo "first_failure=true" >> "$GITHUB_OUTPUT"
          else
            echo "first_failure=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.previous.outputs.first_failure == 'true'
        with:
          sparse-checkout: .github/actions/send-build-alert
          sparse-checkout-cone-mode: false

      - uses: ./.github/actions/send-build-alert
        if: steps.previous.outputs.first_failure == 'true'
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: failure
          slack-user-id: ""
          should-tag: "false"
          channel: "#releases"
