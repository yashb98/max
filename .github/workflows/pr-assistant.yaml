name: PR Assistant Checks

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]
    paths:
      - 'assistant/**'
      - 'credential-executor/**'
      - 'gateway/**'
      - 'packages/**'
      - 'skills/meet-join/contracts/**'
      - 'scripts/skills/**'
      - 'meta/feature-flags/**'
      - '.github/workflows/pr-assistant.yaml'

concurrency:
  group: pr-assistant-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 10
    defaults:
      run:
        working-directory: assistant
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('assistant/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install linked package dependencies
        run: |
          cd ../packages/service-contracts && bun install --frozen-lockfile
          cd ../ces-client && bun install --frozen-lockfile
          cd ../gateway-client && bun install --frozen-lockfile
          cd ../../skills/meet-join && bun install --frozen-lockfile
          cd ../../gateway && bun install --frozen-lockfile

      - name: Sync feature flag registry
        run: cd .. && bun run meta/feature-flags/sync-bundled-copies.ts

      - name: Lint
        run: bun run lint

      - name: Lint unused code
        run: bun run lint:unused

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 10
    defaults:
      run:
        working-directory: assistant
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('assistant/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install linked package dependencies
        run: |
          cd ../packages/service-contracts && bun install --frozen-lockfile
          cd ../ces-client && bun install --frozen-lockfile
          cd ../gateway-client && bun install --frozen-lockfile
          cd ../../skills/meet-join && bun install --frozen-lockfile
          cd ../../gateway && bun install --frozen-lockfile

      - name: Sync feature flag registry
        run: cd .. && bun run meta/feature-flags/sync-bundled-copies.ts

      - name: Type check
        run: bunx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 15
    defaults:
      run:
        working-directory: assistant
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('assistant/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install linked package dependencies
        run: |
          cd ../packages/service-contracts && bun install --frozen-lockfile
          cd ../ces-client && bun install --frozen-lockfile
          cd ../gateway-client && bun install --frozen-lockfile
          cd ../../skills/meet-join && bun install --frozen-lockfile
          cd ../../gateway && bun install --frozen-lockfile

      - name: Sync feature flag registry
        run: cd .. && bun run meta/feature-flags/sync-bundled-copies.ts

      - name: Test
        run: bun run test
        env:
          EXCLUDE_EXPERIMENTAL: 'true'
          TEST_WORKERS: '8'

      # Smoke-run the meet-join manifest emitter so an assistant-side
      # change that breaks the `SkillHost` contract or `register(host)`
      # fails here instead of only at Docker-build or macOS-packaging
      # time. Skill-only changes are covered by pr-skills.yaml via
      # __tests__/emit-manifest.test.ts.
      - name: Smoke test meet-join manifest emit
        run: cd .. && bun run skills/meet-join/scripts/emit-manifest.ts --output /tmp/meet-join-manifest.json

  artifact:
    name: Upload Artifact
    needs: [lint, typecheck, test]
    if: contains(github.event.pull_request.labels.*.name, 'preview')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: assistant
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Zip assistant artifact
        run: zip -r ../assistant-pr-${{ github.event.pull_request.number }}.zip . -x "node_modules/*"

      - name: Upload assistant artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: assistant-pr-${{ github.event.pull_request.number }}
          path: assistant-pr-${{ github.event.pull_request.number }}.zip
          if-no-files-found: error
          retention-days: 7

      - name: Generate GitHub App token
        if: github.event.pull_request.head.repo.full_name == github.repository
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Comment artifact link on PR
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ARTIFACT_NAME="assistant-pr-${{ github.event.pull_request.number }}"
          ARTIFACT_ID=$(gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq ".artifacts[] | select(.name == \"$ARTIFACT_NAME\") | .id")
          ARTIFACT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/$ARTIFACT_ID"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          gh pr comment "$PR_NUMBER" --body "📦 **Assistant artifact** for this PR is ready for download: [Download $ARTIFACT_NAME]($ARTIFACT_URL)

          To run this build locally:
          \`\`\`
          vel up assistant --pr $PR_NUMBER
          \`\`\`"

  openapi-check:
    name: OpenAPI Spec Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: assistant
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Cache bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('assistant/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install linked package dependencies
        run: |
          cd ../packages/service-contracts && bun install --frozen-lockfile
          cd ../ces-client && bun install --frozen-lockfile
          cd ../gateway-client && bun install --frozen-lockfile
          cd ../../skills/meet-join && bun install --frozen-lockfile
          cd ../../gateway && bun install --frozen-lockfile

      - name: Sync feature flag registry
        run: cd .. && bun run meta/feature-flags/sync-bundled-copies.ts

      - name: Check OpenAPI spec is up to date
        run: bun run generate:openapi -- --check

  lint-bundled-skills:
    name: Lint Bundled Skills
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.22.2'

      - name: Validate bundled skills against Agent Skills spec
        run: node scripts/skills/lint-skill-spec.mjs --dir assistant/src/config/bundled-skills --allow-tools-json
