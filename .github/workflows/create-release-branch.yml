name: Create Release Branch

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  compute-version:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Compute version from bump type
        id: compute
        run: |
          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          LATEST_VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  notify-failure:
    name: Slack Notification (Release Branch Failed)
    needs: [compute-version, create-release-branch]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Notify Slack of failure
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            unfurl_links: false
            unfurl_media: false
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "\U0001F6A8 Release Branch Creation Failed"
              - type: section
                text:
                  type: mrkdwn
                  text: "*Workflow:* Create Release Branch\n*Version:* `${{ needs.compute-version.outputs.version }}`\n*Bump:* `${{ inputs.bump }}`\n*Triggered by:* ${{ github.actor }}"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: "View Run"
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  notify-start:
    name: Slack Notification (Release Start)
    needs: [compute-version, create-release-branch]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Find release workflow run
        id: find-run
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          BRANCH="release/v$VERSION"

          # Poll for the release workflow run triggered by the branch push
          RUN_URL=""
          for i in $(seq 1 18); do
            RESPONSE=$(curl -sSL \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/release.yml/runs?branch=$BRANCH&per_page=1" \
              2>/dev/null || echo "")

            if [ -n "$RESPONSE" ]; then
              RUN_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; runs=json.load(sys.stdin).get('workflow_runs',[]); print(runs[0]['id'] if runs else '')" 2>/dev/null || echo "")
            else
              RUN_ID=""
            fi

            if [ -n "$RUN_ID" ]; then
              RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/$RUN_ID"
              echo "Found release workflow run: $RUN_URL"
              break
            fi
            echo "Waiting for release workflow run to appear... (attempt $i/18)"
            sleep 10
          done

          if [ -z "$RUN_URL" ]; then
            echo "::warning::Could not find release workflow run, falling back to current run URL"
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"

      - name: Notify Slack of release start
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            unfurl_links: false
            unfurl_media: false
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "\U0001F680 Release v${{ needs.compute-version.outputs.version }} Started"
              - type: section
                text:
                  type: mrkdwn
                  text: "*Workflow:* Create Release Branch\n*Version:* `${{ needs.compute-version.outputs.version }}`\n*Bump:* `${{ inputs.bump }}`\n*Triggered by:* ${{ github.actor }}"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: "View Run"
                    url: "${{ steps.find-run.outputs.run_url }}"

  create-release-branch:
    needs: compute-version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install package dependencies
        run: |
          for pkg in packages/*/; do
            (cd "$pkg" && bun install --frozen-lockfile)
          done

      - name: Install assistant dependencies
        working-directory: assistant
        run: bun install --frozen-lockfile

      - name: Disable local git hooks
        run: git config --unset core.hooksPath || true

      - name: Create release branch and bump versions
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          BRANCH="release/v$VERSION"
          CHERRY_PICK_BRANCH="cherry-pick/$BRANCH"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete existing cherry-pick branch if it exists (must happen before release branch)
          if git ls-remote --exit-code origin "$CHERRY_PICK_BRANCH" >/dev/null 2>&1; then
            echo "Deleting existing cherry-pick branch: $CHERRY_PICK_BRANCH"
            git push origin --delete "$CHERRY_PICK_BRANCH"
          fi

          # Delete existing release branch if it exists
          if git ls-remote --exit-code origin "$BRANCH" >/dev/null 2>&1; then
            echo "Deleting existing release branch: $BRANCH"
            git push origin --delete "$BRANCH"
          fi

          git checkout -b "$BRANCH"

          # Bump all package.json files
          # NOTE: All service + client versions must stay in sync — Apple Containers
          # assumes the assistant runtime, gateway, and credential executor versions
          # match the macOS app version.
          # If we relax this assumption, adjust the container image logic accordingly.
          for pkg in assistant cli credential-executor gateway meta; do
            jq --arg v "$VERSION" '.version = $v' $pkg/package.json > tmp && mv tmp $pkg/package.json
          done

          # Bump meta-package dependency versions
          jq --arg v "$VERSION" '
            .dependencies["@vellumai/assistant"] = $v |
            .dependencies["@vellumai/cli"] = $v |
            .dependencies["@vellumai/credential-executor"] = $v |
            .dependencies["@vellumai/vellum-gateway"] = $v
          ' meta/package.json > tmp && mv tmp meta/package.json

          # Bump macOS app version
          sed -i "s/^let appVersion = .*/let appVersion = \"$VERSION\"/" clients/Package.swift

          # Bump Chrome extension version (manifest.json + package.json)
          jq --arg v "$VERSION" '.version = $v' clients/chrome-extension/manifest.json > tmp && mv tmp clients/chrome-extension/manifest.json
          jq --arg v "$VERSION" '.version = $v' clients/chrome-extension/package.json > tmp && mv tmp clients/chrome-extension/package.json

          # Bump web client version
          jq --arg v "$VERSION" '.version = $v' clients/web/package.json > tmp && mv tmp clients/web/package.json

          # Regenerate OpenAPI spec with the new version
          cd assistant && bun run generate:openapi && cd ..

          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Release v$VERSION"
          fi
          git push --no-verify origin "$BRANCH"
