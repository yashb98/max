        run: |
          echo "repository=${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GATEWAY_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          echo "tag=v${{ needs.extract-version.outputs.version }}" >> "$GITHUB_OUTPUT"
          echo "sha=${{ steps.release-sha.outputs.sha }}" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "## Gateway Image Published (${{ needs.extract-version.outputs.docker_environment }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** \`${{ needs.extract-version.outputs.docker_environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.extract-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
