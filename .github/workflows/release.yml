  push-dockerhub-image:
    needs: [extract-version, ci-assistant, ci-gateway, ci-credential-executor]
    if: ${{ needs.extract-version.outputs.is_staging != 'true' }}
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: assistant
            runs_on: ubuntu-latest-8-cores
            dockerhub_image_name: vellum-assistant
            context: .
            dockerfile: assistant/Dockerfile
            feature_flag_path: assistant/src/config/feature-flag-registry.json
          - service: gateway
            runs_on: ubuntu-latest
            dockerhub_image_name: vellum-gateway
            context: .
            dockerfile: gateway/Dockerfile
            feature_flag_path: gateway/src/feature-flag-registry.json
          - service: credential-executor
            runs_on: ubuntu-latest
            dockerhub_image_name: vellum-credential-executor
            context: .
            dockerfile: credential-executor/Dockerfile
            feature_flag_path: ""
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Login to Docker Hub
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
          DOCKERHUB_ACCESS_TOKEN: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
        run: bun scripts/docker-login-with-retry.ts

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          version: latest

      - name: Compute Docker Hub tags
        id: tags
        run: |
          IMAGE_NAME="${{ matrix.dockerhub_image_name }}"
          IMAGE="vellumai/${IMAGE_NAME}"
          VERSION="${{ needs.extract-version.outputs.version }}"
          TAGS="${IMAGE}:v${VERSION}"
          TAGS=$(printf "%s\n%s" "$TAGS" "${IMAGE}:latest")
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Sync feature flag registry for Docker context
        if: matrix.feature_flag_path != ''
        run: cp meta/feature-flags/feature-flag-registry.json ${{ matrix.feature_flag_path }}

      - name: Stamp release version into package.json
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          for pkg in assistant/package.json gateway/package.json credential-executor/package.json; do
            [ -f "$pkg" ] && jq --arg v "$VERSION" '.version = $v' "$pkg" > "${pkg}.tmp" && mv "${pkg}.tmp" "$pkg"
          done

      - name: Build and push multi-platform image to Docker Hub
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.tags.outputs.tags }}

      - name: Summary
        run: |
          echo "## Docker Hub Image Published (${{ matrix.service }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`v${{ needs.extract-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Hub:** \`${{ steps.tags.outputs.image }}:v${{ needs.extract-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

