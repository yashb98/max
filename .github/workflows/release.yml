name: Release

on:
  push:
    branches:
      - 'release/v*'
  workflow_dispatch:
    inputs:
      slack_user_id:
        description: 'Slack user ID of the person who triggered the release (e.g. U01ABCDEF)'
        required: false
        type: string
        default: ''
      playwright_blocks_release:
        description: 'Whether Playwright test failures should block the production release'
        required: false
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  extract-version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.finalize.outputs.version }}
      base_version: ${{ steps.extract.outputs.base_version }}
      is_staging: ${{ steps.detect-staging.outputs.is_staging }}
      docker_environment: ${{ steps.finalize.outputs.docker_environment }}
      chrome_extension_changed: ${{ steps.detect-extension-changes.outputs.changed }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Extract version from branch name
        id: extract
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [[ "$BRANCH" == release/v* ]]; then
            BASE_VERSION="${BRANCH#release/v}"
            # Only allow clean semver branches (e.g. release/v0.6.0), reject
            # branches with suffixes like release/v0.6.0-foo.
            if ! [[ "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Branch '$BRANCH' is not a valid release branch. Expected release/vMAJOR.MINOR.PATCH (e.g. release/v0.6.0), got suffix '$BASE_VERSION'."
              exit 1
            fi
          elif [ "$BRANCH" = "main" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git fetch --tags
            LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG="v0.0.0"
            fi
            LATEST_VERSION=${LATEST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
            PATCH=$((PATCH + 1))
            BASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "Computed next patch version from $LATEST_TAG: $BASE_VERSION"
          else
            echo "::error::Workflow must run on a release/v* branch or be manually dispatched from main, got '$BRANCH'"
            exit 1
          fi
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Cancel run if release already published
        # Pushes to release/v$VERSION after the production release has been cut
        # (typically manual merge-back fixups when merge-release-branch fails)
        # otherwise kick off a duplicate staging build. workflow_dispatch is
        # left untouched because that path is always intentional (e.g. retrying
        # a failed publish step on an already-shipped version).
        if: ${{ github.event_name == 'push' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BASE_VERSION="${{ steps.extract.outputs.base_version }}"
          HTTP_STATUS=$(curl -sSL -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v$BASE_VERSION")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "::warning::GitHub Release v$BASE_VERSION is already published. Cancelling this run to avoid a duplicate staging build. Use workflow_dispatch if you need to retry a published version."
            curl -sSL -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/cancel" > /dev/null
            # Wait for the cancellation to land. If it doesn't, fall through and
            # fail-fast so downstream jobs don't run.
            sleep 60
            exit 1
          fi

      - name: Detect staging release
        id: detect-staging
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "is_staging=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch from main — staging deploy"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "is_staging=false" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch on release branch — full production release"
          else
            echo "is_staging=true" >> "$GITHUB_OUTPUT"
            echo "Commit-triggered release — staging only"
          fi

      - name: Compute final version
        id: finalize
        run: |
          BASE_VERSION="${{ steps.extract.outputs.base_version }}"
          IS_STAGING="${{ steps.detect-staging.outputs.is_staging }}"
          if [ "$IS_STAGING" = "true" ]; then
            # Derive the next staging suffix from existing git tags so the
            # postfix monotonically increases per base version regardless of
            # how many total workflow runs exist on the branch.
            git fetch --tags --quiet
            MAX_SUFFIX=0
            for tag in $(git tag -l "v${BASE_VERSION}-staging.*"); do
              SUFFIX="${tag##*staging.}"
              if [ "$SUFFIX" -gt "$MAX_SUFFIX" ] 2>/dev/null; then
                MAX_SUFFIX="$SUFFIX"
              fi
            done
            NEXT_SUFFIX=$((MAX_SUFFIX + 1))
            VERSION="${BASE_VERSION}-staging.${NEXT_SUFFIX}"
            echo "Staging prerelease version: $VERSION (previous max suffix: $MAX_SUFFIX)"
            echo 'docker_environment=staging' >> "$GITHUB_OUTPUT"
          else
            VERSION="$BASE_VERSION"
            echo 'docker_environment=production' >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Detect chrome extension changes
        id: detect-extension-changes
        env:
          BASE_VERSION: ${{ steps.extract.outputs.base_version }}
        run: |
          # Compare clients/chrome-extension/ against the previous release tag.
          # Exclude the current version's tag so retries after tagging still
          # detect minor/major bumps correctly.
          # If no prior tag exists (first release), always build.
          PREV_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | { grep -v "^v${BASE_VERSION}$" || true; } | head -1)

          # Force a build on minor/major version bumps so the CWS listing
          # stays in sync even when the extension code itself hasn't changed.
          if [ -n "$PREV_TAG" ]; then
            PREV_MAJOR_MINOR=$(echo "${PREV_TAG#v}" | cut -d. -f1-2)
            CURR_MAJOR_MINOR=$(echo "$BASE_VERSION" | cut -d. -f1-2)
            if [ "$PREV_MAJOR_MINOR" != "$CURR_MAJOR_MINOR" ]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "Major/minor version changed ($PREV_MAJOR_MINOR -> $CURR_MAJOR_MINOR) — forcing extension build"
              exit 0
            fi
            CHANGED=$(git diff --name-only "$PREV_TAG"..HEAD -- clients/chrome-extension/ \
              ':!clients/chrome-extension/manifest.json' \
              ':!clients/chrome-extension/package.json' | wc -l | tr -d ' ')
          else
            CHANGED=1
          fi

          if [ "$CHANGED" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Chrome extension has $CHANGED changed file(s) since $PREV_TAG"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No chrome extension changes since $PREV_TAG — build & publish will be skipped"
          fi

  notify-release-start:
    name: Slack Notification (Release Build Started)
    needs: extract-version
    # Only fire for push events — workflow_dispatch releases already get a
    # "Release Started" notification from create-release-branch.yml.
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Skip if this is the initial branch-creation push
        id: check
        run: |
          # create-release-branch.yml commits with "Release vX.Y.Z" — skip
          # to avoid duplicating its own Slack notification.
          HEAD_MSG=$(git log -1 --format=%s)
          if [[ "$HEAD_MSG" =~ ^Release\ v[0-9] ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping notification — initial branch-creation commit: $HEAD_MSG"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Slack payload
        if: steps.check.outputs.skip != 'true'
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          IS_STAGING="${{ needs.extract-version.outputs.is_staging }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BRANCH="${GITHUB_REF_NAME}"
          PUSHER="${{ github.actor }}"

          if [ "$IS_STAGING" = "true" ]; then
            HEADER="🔄 Staging Release v${VERSION} Building (cherry-pick)"
          else
            HEADER="🔄 Release v${VERSION} Building (cherry-pick)"
          fi

          BODY=$(printf 'A release build was triggered by a cherry-pick merge to `%s`.\n\n*Version:* `%s`\n*Branch:* `%s`\n*Pushed by:* %s' "$BRANCH" "$VERSION" "$BRANCH" "$PUSHER")

          BLOCKS="[]"
          BLOCKS=$(echo "$BLOCKS" | jq --arg header "$HEADER" '. + [{ type: "header", text: { type: "plain_text", text: $header } }]')
          BLOCKS=$(echo "$BLOCKS" | jq --arg body "$BODY" '. + [{ type: "section", text: { type: "mrkdwn", text: $body } }]')

          VIEW_RUN=$(jq -n --arg url "$RUN_URL" '{
            type: "button",
            text: { type: "plain_text", text: "View Run" },
            url: $url
          }')
          BLOCKS=$(echo "$BLOCKS" | jq --argjson btn "$VIEW_RUN" '. + [{ type: "actions", elements: [$btn] }]')

          jq -n --argjson blocks "$BLOCKS" '{
            unfurl_links: false,
            unfurl_media: false,
            blocks: $blocks
          }' > /tmp/slack-payload.json

      - name: Notify Slack
        id: slack
        if: steps.check.outputs.skip != 'true'
        continue-on-error: true
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack-payload.json
          errors: true

      - name: Log Slack notification result
        if: always() && steps.check.outputs.skip != 'true'
        run: |
          echo "Slack step outcome: ${{ steps.slack.outcome }}"
          if [ "${{ steps.slack.outcome }}" != "success" ]; then
            echo "::warning::Release start Slack notification failed to send."
          fi

  build-chrome-extension:
    needs: [extract-version]
    if: needs.extract-version.outputs.chrome_extension_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install Chrome for CRX signing
        uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce # v1.7.3
        with:
          chrome-version: stable

      - name: Install chrome-extension dependencies
        working-directory: clients/chrome-extension
        run: bun install --frozen-lockfile

      - name: Write CRX signing key
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          if [ -n "$CRX_PRIVATE_KEY" ]; then
            echo "$CRX_PRIVATE_KEY" > clients/chrome-extension/privatekey.pem
            chmod 600 clients/chrome-extension/privatekey.pem
          else
            echo "::warning::CRX_PRIVATE_KEY secret not set — CRX signing will be skipped"
          fi

      - name: Build extension
        working-directory: clients/chrome-extension
        env:
          VERSION: ${{ needs.extract-version.outputs.version }}
          VELLUM_ENVIRONMENT: ${{ needs.extract-version.outputs.is_staging == 'true' && 'staging' || 'production' }}
        run: bash build.sh

      - name: Verify manifest version
        working-directory: clients/chrome-extension
        run: |
          EXPECTED="${{ needs.extract-version.outputs.version }}"
          # build.sh strips prerelease suffixes (e.g. "0.6.0-staging.3" -> "0.6.0")
          # to satisfy Chrome's version format requirement. Match that here.
          EXPECTED="${EXPECTED%%-*}"
          ACTUAL=$(jq -r '.version' dist/manifest.json)
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Manifest version mismatch: expected $EXPECTED, got $ACTUAL"
            exit 1
          fi

      - name: Clean up signing key
        if: always()
        run: rm -f clients/chrome-extension/privatekey.pem

      - name: Upload extension CRX
        if: hashFiles('clients/chrome-extension/vellum-browser-relay.crx') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: chrome-extension-crx
          path: clients/chrome-extension/vellum-browser-relay.crx
          retention-days: 90

      - name: Upload extension zip
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: chrome-extension-zip
          path: clients/chrome-extension/vellum-browser-relay.zip
          retention-days: 90

  publish-chrome-extension:
    needs: [extract-version, build-chrome-extension, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest, push-dockerhub-image]
    if: >-
      needs.extract-version.outputs.chrome_extension_changed == 'true'
      && needs.extract-version.outputs.is_staging == 'false'
      && vars.CWS_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: clients/chrome-extension/extension-environments.json
          sparse-checkout-cone-mode: false

      - name: Read CWS extension ID
        id: read-extension-id
        run: echo "id=$(jq -r '.production.extensionId' clients/chrome-extension/extension-environments.json)" >> "$GITHUB_OUTPUT"

      - name: Download extension zip
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: chrome-extension-zip
          path: /tmp/chrome-extension

      - name: Install chrome-webstore-upload-cli
        run: npm install -g chrome-webstore-upload-cli

      - name: Upload to Chrome Web Store
        env:
          EXTENSION_ID: ${{ steps.read-extension-id.outputs.id }}
          # chrome-webstore-upload-cli reads credentials from CLIENT_ID,
          # CLIENT_SECRET, and REFRESH_TOKEN env vars. The equivalent CLI
          # flags were removed and now cause the CLI to exit with an error.
          # See https://github.com/fregante/chrome-webstore-upload-cli/issues/80.
          CLIENT_ID: ${{ vars.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          E2E_BLOCKS_RELEASE: ${{ inputs.playwright_blocks_release }}
        run: |
          # CWS API requires a zip — it handles signing server-side
          UPLOAD_FILE=$(ls /tmp/chrome-extension/*.zip)
          echo "Uploading: $UPLOAD_FILE"
          set +e
          OUTPUT=$(chrome-webstore-upload upload \
            --source "$UPLOAD_FILE" \
            --extension-id "$EXTENSION_ID" 2>&1)
          EXIT=$?
          set -e
          echo "$OUTPUT"
          if [ $EXIT -ne 0 ] && echo "$OUTPUT" | grep -q "ITEM_NOT_UPDATABLE"; then
            if [ "$E2E_BLOCKS_RELEASE" = "true" ]; then
              echo "::error::CWS rejected upload with ITEM_NOT_UPDATABLE — this version was likely already pushed. e2e tests are gating this release; failing to surface divergence."
              exit 1
            fi
            echo "::notice::CWS already has this version pending/published — skipping upload (e2e is non-blocking, treating as retry)."
            exit 0
          fi
          exit $EXIT

      - name: Publish to Chrome Web Store
        env:
          EXTENSION_ID: ${{ steps.read-extension-id.outputs.id }}
          CLIENT_ID: ${{ vars.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          chrome-webstore-upload publish \
            --extension-id "$EXTENSION_ID"

  push-assistant-image:
    needs: [extract-version, ci-assistant]
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    environment: ${{ needs.extract-version.outputs.docker_environment }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker ${{ secrets.GCP_REGISTRY_HOST }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Compute image names
        id: image
        run: |
          echo "gcp=${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ASSISTANT_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Sync feature flag registry for Docker context
        run: cp meta/feature-flags/feature-flag-registry.json assistant/src/config/feature-flag-registry.json

      - name: Stamp release version into package.json
        run: jq --arg v "${{ needs.extract-version.outputs.version }}" '.version = $v' assistant/package.json > assistant/package.json.tmp && mv assistant/package.json.tmp assistant/package.json

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: assistant/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=${{ steps.image.outputs.gcp }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=assistant-${{ needs.extract-version.outputs.docker_environment }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=assistant-${{ needs.extract-version.outputs.docker_environment }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Prepare platform suffix
        id: platform
        run: |
          platform="${{ matrix.platform }}"
          echo "suffix=${platform//\//-}" >> "$GITHUB_OUTPUT"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: assistant-digests-${{ needs.extract-version.outputs.docker_environment }}-${{ steps.platform.outputs.suffix }}
          path: /tmp/digests/*
          retention-days: 1

  push-assistant-manifest:
    needs: [extract-version, push-assistant-image]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    environment: ${{ needs.extract-version.outputs.docker_environment }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Fail if image build failed
        if: needs.push-assistant-image.result != 'success'
        run: |
          echo "::error::push-assistant-image failed with result: ${{ needs.push-assistant-image.result }}"
          exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Get release SHA
        id: release-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker ${{ secrets.GCP_REGISTRY_HOST }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          version: latest

      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: /tmp/digests
          pattern: assistant-digests-${{ needs.extract-version.outputs.docker_environment }}-*
          merge-multiple: true

      - name: Compute image tags
        id: tags
        run: |
          GCP_IMAGE="${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ASSISTANT_IMAGE_NAME }}"
          VERSION="${{ needs.extract-version.outputs.version }}"
          SHA="${{ steps.release-sha.outputs.sha }}"
          IS_STAGING="${{ needs.extract-version.outputs.is_staging }}"
          GCP_TAGS="${GCP_IMAGE}:${SHA}"
          GCP_TAGS=$(printf "%s\n%s" "$GCP_TAGS" "${GCP_IMAGE}:v${VERSION}")
          if [ "$IS_STAGING" != "true" ]; then
            GCP_TAGS=$(printf "%s\n%s" "$GCP_TAGS" "${GCP_IMAGE}:latest")
          fi

          echo "gcp_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$GCP_TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "gcp_image=${GCP_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Create GCP manifest list and push
        working-directory: /tmp/digests
        run: |
          IMAGE="${{ steps.tags.outputs.gcp_image }}"
          TAG_ARGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS="$TAG_ARGS -t $tag"
          done <<< "${{ steps.tags.outputs.gcp_tags }}"
          SOURCES=$(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create $TAG_ARGS $SOURCES

      - name: Export manifest digest
        id: manifest-digest
        run: |
          IMAGE="${{ steps.tags.outputs.gcp_image }}"
          VERSION="${{ needs.extract-version.outputs.version }}"
          TAG="v${VERSION}"
