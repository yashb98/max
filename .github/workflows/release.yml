          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}


      - name: Get release SHA
        id: release-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download assistant manifest digest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: assistant-manifest-digest-${{ needs.extract-version.outputs.docker_environment }}
          path: /tmp/assistant-digest

      - name: Download gateway manifest digest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: gateway-manifest-digest-${{ needs.extract-version.outputs.docker_environment }}
          path: /tmp/gateway-digest

      - name: Download credential-executor manifest digest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: credential-executor-manifest-digest-${{ needs.extract-version.outputs.docker_environment }}
          path: /tmp/credential-executor-digest

      - name: Extract manifest digests
        id: digests
        run: |
          ASSISTANT_DIGEST=$(cat /tmp/assistant-digest/digest)
          GATEWAY_DIGEST=$(cat /tmp/gateway-digest/digest)
          CREDENTIAL_EXECUTOR_DIGEST=$(cat /tmp/credential-executor-digest/digest)
          echo "assistant_digest=${ASSISTANT_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "credential_executor_digest=${CREDENTIAL_EXECUTOR_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "gateway_digest=${GATEWAY_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Resolve platform credentials
        id: platform-creds
        run: |
          echo "api_url=${{ secrets.PLATFORM_API_URL }}" >> "$GITHUB_OUTPUT"
          echo "api_key=${{ secrets.PLATFORM_INTERNAL_SERVICE_API_KEY }}" >> "$GITHUB_OUTPUT"

      - name: Register release with platform
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          SHA="${{ steps.release-sha.outputs.sha }}"
          ASSISTANT_REPO="${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ASSISTANT_IMAGE_NAME }}"
          GATEWAY_REPO="${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GATEWAY_IMAGE_NAME }}"
          CREDENTIAL_EXECUTOR_REPO="${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.CREDENTIAL_EXECUTOR_IMAGE_NAME }}"
          IS_STABLE="true"

          PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --arg released_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson is_stable "$IS_STABLE" \
            --arg assistant_repo "$ASSISTANT_REPO" \
            --arg assistant_tag "v${VERSION}" \
            --arg assistant_sha "$SHA" \
            --arg assistant_digest "${{ steps.digests.outputs.assistant_digest }}" \
            --arg gateway_repo "$GATEWAY_REPO" \
            --arg gateway_tag "v${VERSION}" \
            --arg gateway_sha "$SHA" \
            --arg gateway_digest "${{ steps.digests.outputs.gateway_digest }}" \
            --arg credential_executor_repo "$CREDENTIAL_EXECUTOR_REPO" \
            --arg credential_executor_tag "v${VERSION}" \
            --arg credential_executor_sha "$SHA" \
            --arg credential_executor_digest "${{ steps.digests.outputs.credential_executor_digest }}" \
            '{
              version: $version,
              released_at: $released_at,
              is_stable: $is_stable,
              assistant_image: {
                repository: $assistant_repo,
                tag: $assistant_tag,
                sha: $assistant_sha,
                digest: $assistant_digest
              },
              gateway_image: {
                repository: $gateway_repo,
                tag: $gateway_tag,
                sha: $gateway_sha,
                digest: $gateway_digest
              },
              credential_executor_image: {
                repository: $credential_executor_repo,
                tag: $credential_executor_tag,
                sha: $credential_executor_sha,
                digest: $credential_executor_digest
              }
            }')

          DELAYS=(5 15 30)
          MAX_ATTEMPTS=3

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            CURL_EXIT=0
            echo "Registering release v${VERSION} with platform (${{ needs.extract-version.outputs.docker_environment }}) [attempt ${attempt}/${MAX_ATTEMPTS}]..."
            HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              -X POST "${{ steps.platform-creds.outputs.api_url }}/v1/internal/assistant-image-releases/" \
              -H "Content-Type: application/json" \
              -H "X-Internal-Service-Api-Key: ${{ steps.platform-creds.outputs.api_key }}" \
              -d "$PAYLOAD") || CURL_EXIT=$?

            if [ "${CURL_EXIT:-0}" -ne 0 ]; then
              echo "::warning::curl transport error (exit code $CURL_EXIT) on attempt ${attempt}"
              HTTP_STATUS="000"
            else
              echo "HTTP Status: $HTTP_STATUS"
              cat /tmp/response.json
            fi

            if [ "$HTTP_STATUS" -ge 200 ] 2>/dev/null && [ "$HTTP_STATUS" -lt 300 ] 2>/dev/null; then
              echo "Registration succeeded on attempt ${attempt}"
              exit 0
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              DELAY=${DELAYS[$((attempt - 1))]}
              echo "::warning::Attempt ${attempt} failed (HTTP $HTTP_STATUS). Retrying in ${DELAY}s..."
              sleep "$DELAY"
            else
              echo "::error::Release registration failed after ${MAX_ATTEMPTS} attempts (last HTTP $HTTP_STATUS)"
              exit 1
            fi
          done

      - name: Summary
        run: |
          echo "## Release Registered (${{ needs.extract-version.outputs.docker_environment }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.extract-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Tag staging release
        if: ${{ needs.extract-version.outputs.is_staging == 'true' }}
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          echo "Tagged staging release: v${VERSION}"

  publish-npm:
    needs: [extract-version, ci-cli, ci-gateway, ci-playwright, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest, push-dockerhub-image]
    if: ${{ always() && !cancelled() && needs.extract-version.outputs.is_staging != 'true' && needs.ci-cli.result == 'success' && needs.ci-gateway.result == 'success' && (needs.ci-playwright.result == 'success' || inputs.playwright_blocks_release != true) && needs.push-assistant-manifest.result == 'success' && needs.push-gateway-manifest.result == 'success' && needs.push-credential-executor-manifest.result == 'success' && needs.push-dockerhub-image.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      matrix:
        package: [assistant, cli, credential-executor, gateway]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Install and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          E2E_BLOCKS_RELEASE: ${{ inputs.playwright_blocks_release }}
        run: |
          PACKAGE="${{ matrix.package }}"
          cd "$PACKAGE"
          if ! bun install --frozen-lockfile; then
            echo "bun install --frozen-lockfile failed; regenerating lockfile and retrying..."
            rm -f bun.lock
            rm -rf node_modules
            bun install
          fi
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            if [ "$E2E_BLOCKS_RELEASE" = "true" ]; then
              echo "::error::$PKG_NAME@$PKG_VERSION is already published, but e2e tests are gating this release. Bump the version — refusing to silently retry."
              exit 1
            fi
            echo "::notice::$PKG_NAME@$PKG_VERSION already published; skipping (e2e is non-blocking, treating as retry)."
            exit 0
          fi
          npm publish --access public --no-provenance

  # ── Staging: pack CLI tarball and dispatch QA to platform repo ──────
  pack-cli:
    needs: [extract-version, ci-cli, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest]
    if: ${{ needs.extract-version.outputs.is_staging == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: |
          cd cli
          if ! bun install --frozen-lockfile; then
            rm -f bun.lock && rm -rf node_modules && bun install
          fi

      - name: Pack CLI tarball
        run: |
          cd cli
          npm pack
          TARBALL=$(ls vellumai-cli-*.tgz)
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "Packed: $TARBALL"
        id: pack

      - name: Upload CLI tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cli-tarball
          path: cli/${{ steps.pack.outputs.tarball }}
          retention-days: 7

  trigger-platform-qa:
    needs: [extract-version, pack-cli]
    if: ${{ needs.extract-version.outputs.is_staging == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: vellum-assistant-platform

      - name: Trigger platform QA
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run qa-cli-staging.yaml \
            --repo vellum-ai/vellum-assistant-platform \
            --field version="${{ needs.extract-version.outputs.version }}" \
            --field run_id="${{ github.run_id }}"

  publish-meta:
    needs: [extract-version, publish-npm]
    if: ${{ needs.extract-version.outputs.is_staging != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Publish meta-package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          E2E_BLOCKS_RELEASE: ${{ inputs.playwright_blocks_release }}
        run: |
          cd meta
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            if [ "$E2E_BLOCKS_RELEASE" = "true" ]; then
              echo "::error::$PKG_NAME@$PKG_VERSION is already published, but e2e tests are gating this release. Bump the version — refusing to silently retry."
              exit 1
            fi
            echo "::notice::$PKG_NAME@$PKG_VERSION already published; skipping (e2e is non-blocking, treating as retry)."
            exit 0
          fi
          npm publish --access public --no-provenance

  # arm64 macOS build — builds Swift + Bun binaries in a single job,
  # creates DMG, notarizes, staples, and generates the Sparkle appcast.
  # This is the primary/default build.
  #
  # `needs:` gates on the three GCR service manifests. We intentionally do NOT
  # list `push-dockerhub-image` here because this job runs in both staging
  # and production, and `push-dockerhub-image` is prod-only (skipped in staging)
  # — a skipped dep would cascade-skip this job in staging. The Docker Hub
  # gate is applied downstream at the `release` job (GitHub Release), which
  # is the sole publisher of the DMG produced here.
  build-macos-arm64:
    needs: [extract-version, ci-assistant, ci-cli, ci-gateway, ci-credential-executor, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest]
    runs-on: macos-26
    timeout-minutes: 45
    defaults:
      run:
        working-directory: clients/macos
    env:
      DMG_PATH: build/vellum-assistant.dmg
      KEYCHAIN_NAME: build.keychain
      KEYCHAIN_PASSWORD: temporary-ci-password
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Import code-signing certificate
        env:
          CERT_P12: ${{ secrets.DEVID_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERT_P12" | base64 -D > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm /tmp/certificate.p12

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Verify signing identity
        run: |
          security find-identity -v -p codesigning | grep -q "Developer ID Application" \
            || { echo "::error::Developer ID Application identity not found in keychain. Check the DEVID_CERTIFICATE_P12 secret."; exit 1; }

      - name: Set version
        id: version
        run: |
          # For staging, use the full prerelease version as DISPLAY_VERSION so
          # the About window shows e.g. "0.6.0-staging.3" instead of just "0.6.0".
          IS_STAGING="${{ needs.extract-version.outputs.is_staging }}"
          if [ "$IS_STAGING" = "true" ]; then
            DISPLAY_VERSION="${{ needs.extract-version.outputs.version }}"
          else
            DISPLAY_VERSION="${{ needs.extract-version.outputs.base_version }}"
          fi
          BUILD_VERSION=$(date -u +%Y%m%d%H%M)
          echo "display_version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=${{ needs.extract-version.outputs.version }}" >> "$GITHUB_OUTPUT"
          echo "Display version: $DISPLAY_VERSION / Build version: $BUILD_VERSION / Full version: ${{ needs.extract-version.outputs.version }}"

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install nested package dependencies
        working-directory: .
        run: |
          for dir in packages/*/ skills/*/; do
            [ -f "${dir}/package.json" ] || continue
            echo "Installing dependencies in ${dir}"
            (cd "${dir}" && bun install --frozen-lockfile 2>/dev/null || bun install)
          done

      - name: Build binaries
        run: |
          VELLUM_ENVIRONMENT="${{ needs.extract-version.outputs.is_staging == 'true' && 'staging' || 'production' }}" \
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}" \
          COMMIT_SHA="${{ github.sha }}" \
          ./build.sh binaries

      - name: Build release .app
        run: |
          IS_STAGING="${{ needs.extract-version.outputs.is_staging }}"
          if [ "$IS_STAGING" = "true" ]; then
            export BUNDLE_DISPLAY_NAME="Vellum Staging"
            export SU_FEED_URL="https://storage.googleapis.com/vellum-staging-sparkle/staging/appcast.xml"
          fi
          BUNDLE_DISPLAY_NAME="${BUNDLE_DISPLAY_NAME:-Vellum}"
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}" \
          BUILD_VERSION="${{ steps.version.outputs.build_version }}" \
          COMMIT_SHA="${{ github.sha }}" \
          SU_PUBLIC_ED_KEY="${{ secrets.SPARKLE_ED_PUBLIC_KEY }}" \
          SENTRY_DSN_MACOS="${{ secrets.SENTRY_DSN_MACOS }}" \
          SENTRY_DSN_ASSISTANT="${{ secrets.SENTRY_DSN_ASSISTANT }}" \
          SIGN_IDENTITY="Developer ID Application" \
          RELEASE_ARCH_FLAGS="--arch arm64" \
          SKIP_BUN_REBUILD=1 \
          ./build.sh release

          APP_PATH="dist/$BUNDLE_DISPLAY_NAME.app"
          ls -la "$APP_PATH"
          codesign --verify --strict "$APP_PATH"
          echo "Code signature verified"

          echo "Main executable architecture:"
          file "$APP_PATH/Contents/MacOS/$BUNDLE_DISPLAY_NAME"

      - name: Upload dSYMs to Sentry
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG || 'vellum' }}
          SENTRY_PROJECT_MACOS: ${{ vars.SENTRY_PROJECT_MACOS || 'vellum-assistant-macos' }}
          SENTRY_PROJECT_ASSISTANT: ${{ vars.SENTRY_PROJECT_ASSISTANT || 'vellum-assistant-brain' }}
        run: |
          npm install -g @sentry/cli@2.42.2
          sentry-cli debug-files upload --org "$SENTRY_ORG" --project "$SENTRY_PROJECT_MACOS" dist/*.dSYM
          sentry-cli debug-files upload --org "$SENTRY_ORG" --project "$SENTRY_PROJECT_ASSISTANT" dist/*.dSYM

      - name: Free disk space
        run: |
          rm -rf .build daemon-bin assistant-bin cli-bin gateway-bin ces-bin
          rm -rf ../../assistant/node_modules ../../cli/node_modules ../../gateway/node_modules ../../credential-executor/node_modules
          rm -rf ~/Library/Developer/Xcode/DerivedData 2>/dev/null || true
          rm -rf ~/Library/Caches/org.swift.swiftpm 2>/dev/null || true
          df -h .
          echo "Disk space freed"

      - name: Cache Homebrew create-dmg
        id: cache-create-dmg
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            /usr/local/Cellar/create-dmg
            /opt/homebrew/Cellar/create-dmg
          key: create-dmg-v1-${{ runner.os }}-${{ runner.arch }}

      - name: Install create-dmg
        if: steps.cache-create-dmg.outputs.cache-hit != 'true'
        run: brew install create-dmg

      - name: Link create-dmg
        if: steps.cache-create-dmg.outputs.cache-hit == 'true'
        run: brew link create-dmg 2>/dev/null || true

      - name: Create DMG
        run: |
          IS_STAGING="${{ needs.extract-version.outputs.is_staging }}"
          if [ "$IS_STAGING" = "true" ]; then
            BUNDLE_DISPLAY_NAME="Vellum Staging"
          else
            BUNDLE_DISPLAY_NAME="Vellum"
          fi
          APP_PATH="dist/$BUNDLE_DISPLAY_NAME.app"

          DMG_STAGING="build/dmg-staging"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          echo "Staging directory size:"
          du -sh "$DMG_STAGING"

          create-dmg \
            --volname "$BUNDLE_DISPLAY_NAME" \
            --background "dmg/dmg-background@2x.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --text-size 10 \
            --icon "$BUNDLE_DISPLAY_NAME.app" 175 190 \
            --icon "Applications" 530 190 \
            --hide-extension "$BUNDLE_DISPLAY_NAME.app" \
            --no-internet-enable \
            "$DMG_PATH" \
            "$DMG_STAGING/" \
          || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 2 ] && [ -f "$DMG_PATH" ]; then
              echo "create-dmg exited with warning (code 2), but DMG was created successfully"
            else
              echo "create-dmg failed with exit code $EXIT_CODE"
              exit $EXIT_CODE
            fi
          }

          echo "DMG created at $DMG_PATH"
          ls -lh "$DMG_PATH"

      - name: Sign DMG
        run: |
          codesign --sign "Developer ID Application" \
            --timestamp \
            "$DMG_PATH"

          codesign --verify --verbose "$DMG_PATH"
          echo "DMG signature verified"

      - name: Notarize DMG
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_P8" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

          echo "Submitting DMG for notarization..."
          NOTARIZE_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            --key ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait \
            --timeout 30m \
            2>&1) || NOTARIZE_FAILED=true

          echo "$NOTARIZE_OUTPUT"

          SUBMISSION_ID=$(echo "$NOTARIZE_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

          if [ "$NOTARIZE_FAILED" = "true" ] || echo "$NOTARIZE_OUTPUT" | grep -q "status: Invalid"; then
            echo "::error::Notarization failed (status: Invalid or command error)"
            if [ -n "$SUBMISSION_ID" ]; then
              echo "Fetching notarization log for submission $SUBMISSION_ID..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --key ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
                --key-id "$ASC_KEY_ID" \
                --issuer "$ASC_ISSUER_ID" \
                || echo "::warning::Could not fetch notarization log"
            fi
            exit 1
          fi

          echo "Notarization succeeded (status: Accepted)"

      - name: Staple notarization ticket
        run: |
          MAX_ATTEMPTS=15
          WAIT_SECS=60
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STAPLE_OUTPUT=$(xcrun stapler staple "$DMG_PATH" 2>&1)
            STAPLE_EXIT=$?
            if [ $STAPLE_EXIT -eq 0 ]; then
              echo "Stapling succeeded on attempt $i"
              echo "$STAPLE_OUTPUT"
              break
            fi
            echo "::warning::Stapling attempt $i/$MAX_ATTEMPTS failed (exit code $STAPLE_EXIT):"
            echo "$STAPLE_OUTPUT"
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Stapling failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi
            echo "Waiting ${WAIT_SECS}s for CDN propagation..."
            sleep $WAIT_SECS
            WAIT_SECS=$((WAIT_SECS + 15))
          done

          xcrun stapler validate "$DMG_PATH"
          echo "Notarization ticket stapled and validated"

      - name: Build ZIP for Sparkle auto-update
        run: |
          IS_STAGING="${{ needs.extract-version.outputs.is_staging }}"
          if [ "$IS_STAGING" = "true" ]; then
            BUNDLE_DISPLAY_NAME="Vellum Staging"
          else
            BUNDLE_DISPLAY_NAME="Vellum"
          fi
          cd dist
          ditto -c -k --keepParent "$BUNDLE_DISPLAY_NAME.app" vellum-assistant.zip
          echo "Sparkle ZIP created:"
          ls -lh vellum-assistant.zip

      - name: Cache Homebrew Sparkle
        id: cache-sparkle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            /usr/local/Caskroom/sparkle
            /opt/homebrew/Caskroom/sparkle
          key: sparkle-v1-${{ runner.os }}-${{ runner.arch }}

      - name: Install Sparkle sign_update tool
        run: |
          if [ "${{ steps.cache-sparkle.outputs.cache-hit }}" != "true" ]; then
            brew install sparkle
          fi
          SPARKLE_BIN=$(find /opt/homebrew/Caskroom/sparkle -name sign_update -type f 2>/dev/null | head -1)
          if [ -z "$SPARKLE_BIN" ]; then
            SPARKLE_BIN=$(find /usr/local/Caskroom/sparkle -name sign_update -type f 2>/dev/null | head -1)
          fi
          echo "Found sign_update at: $SPARKLE_BIN"
          echo "$(dirname "$SPARKLE_BIN")" >> "$GITHUB_PATH"

      - name: Generate appcast.xml
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}"
          BUILD_VERSION="${{ steps.version.outputs.build_version }}"
          IS_STAGING="${{ needs.extract-version.outputs.is_staging }}"

          ED_KEY_FILE=$(mktemp)
          echo "$SPARKLE_ED_PRIVATE_KEY" > "$ED_KEY_FILE"
          SIGN_OUTPUT=$(sign_update dist/vellum-assistant.zip --ed-key-file "$ED_KEY_FILE") || {
            echo "sign_update failed with exit code $?"
            rm -f "$ED_KEY_FILE"
            exit 1
          }
          rm -f "$ED_KEY_FILE"
          echo "sign_update output: ${SIGN_OUTPUT:0:40}..."
          SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
          SIZE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')
          if [ -z "$SIGNATURE" ]; then
            echo "ERROR: Failed to parse edSignature from sign_update output"
            exit 1
          fi
          if [ -z "$SIZE" ]; then
            SIZE=$(stat -f%z dist/vellum-assistant.zip)
          fi

          REPO="${{ github.repository }}"
          if [ "$IS_STAGING" = "true" ]; then
            DOWNLOAD_URL="https://storage.googleapis.com/vellum-staging-sparkle/staging/vellum-assistant.zip"
            TITLE="Vellum Staging"
          else
            DOWNLOAD_URL="https://github.com/${REPO}/releases/latest/download/vellum-assistant.zip"
            TITLE="Vellum"
          fi

          FILENAME="appcast.xml"
          cat > "dist/$FILENAME" << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>${TITLE}</title>
              <item>
                <title>${DISPLAY_VERSION}</title>
                <sparkle:version>${BUILD_VERSION}</sparkle:version>
                <sparkle:shortVersionString>${DISPLAY_VERSION}</sparkle:shortVersionString>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  sparkle:edSignature="${SIGNATURE}"
                  length="${SIZE}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF
          echo "Appcast generated for $REPO (staging=$IS_STAGING)"

      - name: Upload macOS build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: macos-build
          path: |
            clients/macos/build/vellum-assistant.dmg
            clients/macos/dist/vellum-assistant.zip
            clients/macos/dist/appcast.xml
          if-no-files-found: error
          retention-days: 7

      - name: Cleanup keychain and keys
        if: always()
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -rf ~/.private_keys 2>/dev/null || true

  # x86_64 macOS build — builds Swift + Bun binaries in a single job,
  # produces a separate DMG for Intel Macs.
  # Runs in parallel with build-macos-arm64 and does NOT block the release job.
  build-macos-x64:
    needs: [extract-version, ci-assistant, ci-cli, ci-gateway, ci-credential-executor, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest]
    runs-on: macos-26
    timeout-minutes: 45
    continue-on-error: true
    defaults:
      run:
        working-directory: clients/macos
    env:
      DMG_PATH: build/vellum-assistant-x64.dmg
      KEYCHAIN_NAME: build-x64.keychain
      KEYCHAIN_PASSWORD: temporary-ci-password
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Import code-signing certificate
        env:
          CERT_P12: ${{ secrets.DEVID_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERT_P12" | base64 -D > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm /tmp/certificate.p12

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Verify signing identity
        run: |
          security find-identity -v -p codesigning | grep -q "Developer ID Application" \
            || { echo "::error::Developer ID Application identity not found in keychain. Check the DEVID_CERTIFICATE_P12 secret."; exit 1; }

      - name: Set version
        id: version
        run: |
          IS_STAGING="${{ needs.extract-version.outputs.is_staging }}"
          if [ "$IS_STAGING" = "true" ]; then
            DISPLAY_VERSION="${{ needs.extract-version.outputs.version }}"
          else
            DISPLAY_VERSION="${{ needs.extract-version.outputs.base_version }}"
          fi
          BUILD_VERSION=$(date -u +%Y%m%d%H%M)
          echo "display_version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=${{ needs.extract-version.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install nested package dependencies
        working-directory: .
        run: |
          for dir in packages/*/ skills/*/; do
            [ -f "${dir}/package.json" ] || continue
            echo "Installing dependencies in ${dir}"
            (cd "${dir}" && bun install --frozen-lockfile 2>/dev/null || bun install)
          done

      - name: Build Bun binaries (x64)
        run: |
          # Build x64 Bun binaries by targeting x64 explicitly
          command -v bun &>/dev/null || { echo "ERROR: bun is required but not found"; exit 1; }

          ASSISTANT_SRC_DIR="../../assistant"
          CLI_SRC_DIR="../../cli"
          GATEWAY_SRC_DIR="../../gateway"
          CES_SRC_DIR="../../credential-executor"

          DAEMON_EXTERNAL_FLAGS=(--external electron --external "chromium-bidi/*")
          DAEMON_FLAGS=("${DAEMON_EXTERNAL_FLAGS[@]}")
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}"
          if [ -n "$DISPLAY_VERSION" ] && [ "$DISPLAY_VERSION" != "0.1.0" ]; then
            DAEMON_FLAGS+=(--define "process.env.APP_VERSION='$DISPLAY_VERSION'")
          fi
          DAEMON_FLAGS+=(--define "process.env.COMMIT_SHA='${{ github.sha }}'")

          # Embed VELLUM_ENVIRONMENT at compile time so all binaries know their
          # runtime context without any filesystem lookup.
          VELLUM_ENVIRONMENT_VALUE="${{ needs.extract-version.outputs.is_staging == 'true' && 'staging' || 'production' }}"
          ENV_DEFINE=(--define "process.env.VELLUM_ENVIRONMENT='$VELLUM_ENVIRONMENT_VALUE'")
          DAEMON_FLAGS+=("${ENV_DEFINE[@]}")
          DAEMON_EXTERNAL_FLAGS+=("${ENV_DEFINE[@]}")

          # Daemon
          (cd "$ASSISTANT_SRC_DIR" && bun install --frozen-lockfile 2>/dev/null || bun install)
          mkdir -p daemon-bin
          bun build --compile "${DAEMON_FLAGS[@]}" --target=bun-darwin-x64 \
            "$ASSISTANT_SRC_DIR/src/daemon/main.ts" --outfile daemon-bin/vellum-daemon
          chmod +x daemon-bin/vellum-daemon
          rm -rf daemon-bin/node_modules
          rm -rf daemon-bin/bundled-skills
          cp -R "$ASSISTANT_SRC_DIR/src/config/bundled-skills" daemon-bin/bundled-skills
          rm -rf daemon-bin/templates
          cp -R "$ASSISTANT_SRC_DIR/src/prompts/templates" daemon-bin/templates
          rm -rf daemon-bin/brain-graph
          mkdir -p daemon-bin/brain-graph
          cp "$ASSISTANT_SRC_DIR/src/runtime/routes/brain-graph/brain-graph.html" daemon-bin/brain-graph/

          # Assistant CLI
          mkdir -p assistant-bin
          bun build --compile "${DAEMON_EXTERNAL_FLAGS[@]}" --target=bun-darwin-x64 \
            "$ASSISTANT_SRC_DIR/src/index.ts" --outfile assistant-bin/vellum-assistant
          chmod +x assistant-bin/vellum-assistant

          # CLI
          (cd "$CLI_SRC_DIR" && bun install --frozen-lockfile 2>/dev/null || bun install)
          mkdir -p cli-bin
          bun build --compile "${ENV_DEFINE[@]}" --target=bun-darwin-x64 \
            "$CLI_SRC_DIR/src/index.ts" --outfile cli-bin/vellum-cli
          chmod +x cli-bin/vellum-cli

          # Gateway
          (cd "$GATEWAY_SRC_DIR" && bun install --frozen-lockfile 2>/dev/null || bun install)
          mkdir -p gateway-bin
          bun build --compile "${ENV_DEFINE[@]}" --target=bun-darwin-x64 \
            "$GATEWAY_SRC_DIR/src/index.ts" --outfile gateway-bin/vellum-gateway
          chmod +x gateway-bin/vellum-gateway
          cp "$GATEWAY_SRC_DIR/node_modules/web-tree-sitter/web-tree-sitter.wasm" gateway-bin/
          cp "$GATEWAY_SRC_DIR/node_modules/tree-sitter-bash/tree-sitter-bash.wasm" gateway-bin/

          # Credential-executor (CES)
          (cd "$CES_SRC_DIR" && bun install --frozen-lockfile 2>/dev/null || bun install)
          mkdir -p ces-bin
          bun build --compile "${ENV_DEFINE[@]}" --target=bun-darwin-x64 \
            "$CES_SRC_DIR/src/main.ts" --outfile ces-bin/credential-executor
          chmod +x ces-bin/credential-executor

      - name: Build release .app
        run: |
          IS_STAGING="${{ needs.extract-version.outputs.is_staging }}"
          if [ "$IS_STAGING" = "true" ]; then
            export BUNDLE_DISPLAY_NAME="Vellum Staging"
            export SU_FEED_URL="https://storage.googleapis.com/vellum-staging-sparkle/staging/appcast.xml"
          fi
          BUNDLE_DISPLAY_NAME="${BUNDLE_DISPLAY_NAME:-Vellum}"
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}" \
          BUILD_VERSION="${{ steps.version.outputs.build_version }}" \
          COMMIT_SHA="${{ github.sha }}" \
          SU_PUBLIC_ED_KEY="${{ secrets.SPARKLE_ED_PUBLIC_KEY }}" \
          SENTRY_DSN_MACOS="${{ secrets.SENTRY_DSN_MACOS }}" \
          SENTRY_DSN_ASSISTANT="${{ secrets.SENTRY_DSN_ASSISTANT }}" \
          SIGN_IDENTITY="Developer ID Application" \
          RELEASE_ARCH_FLAGS="--arch x86_64" \
          SKIP_BUN_REBUILD=1 \
          ./build.sh release

          APP_PATH="dist/$BUNDLE_DISPLAY_NAME.app"
          ls -la "$APP_PATH"
          codesign --verify --strict "$APP_PATH"
          echo "Code signature verified"

          echo "Main executable architecture:"
          file "$APP_PATH/Contents/MacOS/$BUNDLE_DISPLAY_NAME"

          echo "Daemon binary architecture:"
          file "$APP_PATH/Contents/MacOS/vellum-daemon"

      - name: Upload dSYMs to Sentry
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG || 'vellum' }}
          SENTRY_PROJECT_MACOS: ${{ vars.SENTRY_PROJECT_MACOS || 'vellum-assistant-macos' }}
          SENTRY_PROJECT_ASSISTANT: ${{ vars.SENTRY_PROJECT_ASSISTANT || 'vellum-assistant-brain' }}
        run: |
          npm install -g @sentry/cli@2.42.2
          sentry-cli debug-files upload --org "$SENTRY_ORG" --project "$SENTRY_PROJECT_MACOS" dist/*.dSYM
          sentry-cli debug-files upload --org "$SENTRY_ORG" --project "$SENTRY_PROJECT_ASSISTANT" dist/*.dSYM

      - name: Free disk space
        run: |
          rm -rf .build daemon-bin assistant-bin cli-bin gateway-bin ces-bin
          rm -rf ../../assistant/node_modules ../../cli/node_modules ../../gateway/node_modules ../../credential-executor/node_modules
          rm -rf ~/Library/Developer/Xcode/DerivedData 2>/dev/null || true
          df -h .

      - name: Cache Homebrew create-dmg
        id: cache-create-dmg-x64
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            /usr/local/Cellar/create-dmg
            /opt/homebrew/Cellar/create-dmg
          key: create-dmg-v1-${{ runner.os }}-${{ runner.arch }}

      - name: Install create-dmg
        if: steps.cache-create-dmg-x64.outputs.cache-hit != 'true'
        run: brew install create-dmg

      - name: Link create-dmg
        if: steps.cache-create-dmg-x64.outputs.cache-hit == 'true'
        run: brew link create-dmg 2>/dev/null || true

      - name: Create DMG
        run: |
          IS_STAGING="${{ needs.extract-version.outputs.is_staging }}"
          if [ "$IS_STAGING" = "true" ]; then
            BUNDLE_DISPLAY_NAME="Vellum Staging"
          else
            BUNDLE_DISPLAY_NAME="Vellum"
          fi
          APP_PATH="dist/$BUNDLE_DISPLAY_NAME.app"

          DMG_STAGING="build/dmg-staging"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          echo "Staging directory size:"
          du -sh "$DMG_STAGING"

          create-dmg \
            --volname "$BUNDLE_DISPLAY_NAME" \
            --background "dmg/dmg-background@2x.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --text-size 10 \
            --icon "$BUNDLE_DISPLAY_NAME.app" 175 190 \
            --icon "Applications" 530 190 \
            --hide-extension "$BUNDLE_DISPLAY_NAME.app" \
            --no-internet-enable \
            "$DMG_PATH" \
            "$DMG_STAGING/" \
          || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 2 ] && [ -f "$DMG_PATH" ]; then
              echo "create-dmg exited with warning (code 2), but DMG was created successfully"
            else
              echo "create-dmg failed with exit code $EXIT_CODE"
              exit $EXIT_CODE
            fi
          }

          echo "DMG created at $DMG_PATH"
          ls -lh "$DMG_PATH"

      - name: Sign DMG
        run: |
          codesign --sign "Developer ID Application" \
            --timestamp \
            "$DMG_PATH"

          codesign --verify --verbose "$DMG_PATH"
          echo "DMG signature verified"

      - name: Notarize DMG
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_P8" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

          echo "Submitting x64 DMG for notarization..."
          NOTARIZE_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            --key ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait \
            --timeout 30m \
            2>&1) || NOTARIZE_FAILED=true

          echo "$NOTARIZE_OUTPUT"

          SUBMISSION_ID=$(echo "$NOTARIZE_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

          if [ "$NOTARIZE_FAILED" = "true" ] || echo "$NOTARIZE_OUTPUT" | grep -q "status: Invalid"; then
            echo "::error::x64 notarization failed (status: Invalid or command error)"
            if [ -n "$SUBMISSION_ID" ]; then
              echo "Fetching notarization log for submission $SUBMISSION_ID..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --key ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
                --key-id "$ASC_KEY_ID" \
                --issuer "$ASC_ISSUER_ID" \
                || echo "::warning::Could not fetch notarization log"
            fi
            exit 1
          fi

          echo "x64 notarization succeeded (status: Accepted)"

      - name: Staple notarization ticket
        run: |
          MAX_ATTEMPTS=15
          WAIT_SECS=60
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STAPLE_OUTPUT=$(xcrun stapler staple "$DMG_PATH" 2>&1)
            STAPLE_EXIT=$?
            if [ $STAPLE_EXIT -eq 0 ]; then
              echo "Stapling succeeded on attempt $i"
              echo "$STAPLE_OUTPUT"
              break
            fi
            echo "::warning::Stapling attempt $i/$MAX_ATTEMPTS failed (exit code $STAPLE_EXIT):"
            echo "$STAPLE_OUTPUT"
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Stapling failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi
            echo "Waiting ${WAIT_SECS}s for CDN propagation..."
            sleep $WAIT_SECS
            WAIT_SECS=$((WAIT_SECS + 15))
          done

          xcrun stapler validate "$DMG_PATH"
          echo "x64 notarization ticket stapled and validated"

      - name: Upload x64 DMG artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: macos-build-x64
          path: clients/macos/build/vellum-assistant-x64.dmg
          if-no-files-found: error
          retention-days: 7

      - name: Cleanup keychain and keys
        if: always()
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -rf ~/.private_keys 2>/dev/null || true

  release:
    needs: [extract-version, publish-npm, publish-meta, build-macos-arm64, build-macos-x64, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest, push-dockerhub-image, ci-playwright, build-chrome-extension]
    if: ${{ always() && !cancelled() && needs.extract-version.outputs.is_staging != 'true' && needs.extract-version.result == 'success' && needs.publish-npm.result == 'success' && needs.publish-meta.result == 'success' && needs.build-macos-arm64.result == 'success' && (needs.ci-playwright.result == 'success' || inputs.playwright_blocks_release != true) && needs.push-assistant-manifest.result == 'success' && needs.push-gateway-manifest.result == 'success' && needs.push-credential-executor-manifest.result == 'success' && needs.push-dockerhub-image.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: vellum-assistant,velly

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Tag release
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          git tag "v$VERSION" 2>/dev/null || true
          git push origin "v$VERSION" 2>/dev/null || echo "Tag v$VERSION already exists on remote"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Generate release notes from commits
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd scripts && bun install && cd ..
          bun scripts/generate-release-notes.ts \
            --version "${{ needs.extract-version.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --output /tmp/release-notes.md

      - name: Download macOS build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: macos-build
          path: macos-artifacts

      - name: Download x64 DMG artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: macos-build-x64
          path: macos-artifacts-x64

      - name: Download Chrome extension zip
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: chrome-extension-zip
          path: chrome-extension-artifacts

      - name: Create GitHub Releases
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          VERSION_TAG="v${VERSION}"
          NOTES_FILE="/tmp/release-notes.md"

          ASSETS=()
          if [ -d "macos-artifacts" ]; then
            DMG=$(find macos-artifacts -name "vellum-assistant.dmg" -type f | head -1)
            ZIP=$(find macos-artifacts -name "vellum-assistant.zip" -type f | head -1)
            APPCAST=$(find macos-artifacts -name "appcast.xml" -type f | head -1)
            [ -n "$DMG" ] && ASSETS+=("$DMG#vellum-assistant.dmg")
            [ -n "$ZIP" ] && ASSETS+=("$ZIP#vellum-assistant.zip")
            [ -n "$APPCAST" ] && ASSETS+=("$APPCAST#appcast.xml")
          fi

          # Add x64 DMG if available (non-blocking — may not exist if x64 build failed)
          if [ -d "macos-artifacts-x64" ]; then
            X64_DMG=$(find macos-artifacts-x64 -name "vellum-assistant-x64.dmg" -type f | head -1)
            [ -n "$X64_DMG" ] && ASSETS+=("$X64_DMG#vellum-assistant-x64.dmg")
          fi

          INSTALL_SH="cli/src/adapters/install.sh"
          [ -f "$INSTALL_SH" ] && ASSETS+=("$INSTALL_SH#install.sh")

          # Add Chrome extension zip if available
          if [ -d "chrome-extension-artifacts" ]; then
            CRX_ZIP=$(find chrome-extension-artifacts -name "vellum-browser-relay-*.zip" -type f | sort | head -1)
            [ -n "$CRX_ZIP" ] && ASSETS+=("$CRX_ZIP#vellum-browser-relay-${VERSION}.zip")
          fi

          echo "Release assets: ${ASSETS[*]}"

          # Create release on vellum-assistant (this repo)
          if ! gh release view "$VERSION_TAG" --repo "${{ github.repository }}" &>/dev/null; then
            gh release create "$VERSION_TAG" \
              "${ASSETS[@]}" \
              --repo "${{ github.repository }}" \
              --title "Vellum $VERSION" \
              --notes-file "$NOTES_FILE" \
              --latest
            echo "Release created at https://github.com/${{ github.repository }}/releases/tag/$VERSION_TAG"
          else
            echo "Release $VERSION_TAG already exists on ${{ github.repository }}, skipping"
          fi

          # TODO(v1.0.0): Delete this block. It mirrors releases to the legacy
          # vellum-ai/velly repo so that older Sparkle clients still pointing
          # at velly can pick up new versions.
          LEGACY_REPO="vellum-ai/velly"
          if ! gh release view "$VERSION_TAG" --repo "$LEGACY_REPO" &>/dev/null; then
            gh release create "$VERSION_TAG" \
              "${ASSETS[@]}" \
              --repo "$LEGACY_REPO" \
              --title "Vellum $VERSION" \
              --notes-file "$NOTES_FILE" \
              --latest
            echo "Release mirrored to https://github.com/$LEGACY_REPO/releases/tag/$VERSION_TAG"
          else
            echo "Release $VERSION_TAG already exists on $LEGACY_REPO, skipping"
          fi

          rm -f "$NOTES_FILE"

  merge-release-branch:
    needs: [extract-version, release, register-release]
    if: ${{ !cancelled() && needs.extract-version.outputs.is_staging != 'true' && needs.release.result == 'success' && needs.register-release.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      outcome: ${{ steps.merge.outcome }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Merge release branch and delete
        id: merge
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          BRANCH="release/v$VERSION"

          PR_URL=$(gh pr create \
            --title "Release v$VERSION" \
            --body "Automated version bump to $VERSION." \
            --base main \
            --head "$BRANCH")

          # Try the normal merge first. If it fails (e.g. due to cherry-picked
          # commits causing conflicts), rebase onto main with `-X theirs` to
          # auto-resolve textual conflicts in favor of the release branch and
          # retry. The release branch is the source of truth for the version
          # being shipped, so taking its side is the safe default.
          if ! gh pr merge "$PR_URL" --squash --admin --delete-branch; then
            echo "Merge failed — rebasing with -X theirs to resolve cherry-pick conflicts"

            git config user.name "vellum-automation[bot]"
            git config user.email "192048195+vellum-automation[bot]@users.noreply.github.com"

            git fetch origin main
            git rebase -X theirs origin/main

            # Append [skip ci] so the force-push doesn't re-trigger this workflow
            git commit --allow-empty --amend -m "$(git log -1 --format=%B) [skip ci]"
            git push --no-verify origin "$BRANCH" --force-with-lease

            # Give GitHub time to process the force-push before retrying
            sleep 10
            gh pr merge "$PR_URL" --squash --admin --delete-branch
          fi

  update-platform:
    needs: [extract-version, publish-npm]
    if: ${{ needs.extract-version.outputs.is_staging != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: vellum-assistant-platform

      - name: Checkout platform repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: vellum-ai/vellum-assistant-platform
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Update vel dependency
        env:
          NEW_VERSION: ${{ needs.extract-version.outputs.version }}
        run: |
          cd vel
          jq --arg v "$NEW_VERSION" '.dependencies["@vellumai/cli"] = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          bun install

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_VERSION: ${{ needs.extract-version.outputs.version }}
        run: |
          BRANCH="auto/bump-cli-${NEW_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add vel/package.json vel/bun.lock
          git commit -m "Bump @vellumai/cli to ${NEW_VERSION} in vel"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --repo vellum-ai/vellum-assistant-platform \
            --title "Bump @vellumai/cli to ${NEW_VERSION} in vel" \
            --body "Auto-generated PR to update @vellumai/cli to ${NEW_VERSION}." \
            --base main \
            --head "$BRANCH")
          sleep 10
          gh pr merge "$PR_URL" --auto --squash

  # ── Dispatch iOS release to platform repo ────────────────────────────

  dispatch-ios-release:
    needs: [extract-version, publish-npm, publish-meta, build-macos-arm64, build-macos-x64, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest, push-dockerhub-image, build-chrome-extension]
    if: >-
      ${{
        always() && !cancelled()
        && needs.extract-version.result == 'success'
        && needs.build-macos-arm64.result == 'success'
        && needs.build-macos-x64.result == 'success'
        && needs.push-assistant-manifest.result == 'success'
        && needs.push-gateway-manifest.result == 'success'
        && needs.push-credential-executor-manifest.result == 'success'
        && needs.build-chrome-extension.result == 'success'
        && (needs.publish-npm.result == 'success' || needs.publish-npm.result == 'skipped')
        && (needs.publish-meta.result == 'success' || needs.publish-meta.result == 'skipped')
        && (needs.push-dockerhub-image.result == 'success' || needs.push-dockerhub-image.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: vellum-assistant-platform

      - name: Dispatch iOS release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          IS_STAGING="${{ needs.extract-version.outputs.is_staging }}"
          if [ "$IS_STAGING" = "true" ]; then
            ENVIRONMENT="staging"
          else
            ENVIRONMENT="production"
          fi
          curl -fsSL \
            -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/vellum-ai/vellum-assistant-platform/dispatches" \
            -d "{\"event_type\":\"ios-release\",\"client_payload\":{\"environment\":\"$ENVIRONMENT\",\"version\":\"$VERSION\"}}"
          echo "Dispatched ios-release to vellum-assistant-platform (environment=$ENVIRONMENT, version=$VERSION)"

  # ci-assistant runs lint/typecheck/test for the assistant service. It also
  # transitively gates the release pipeline because push-assistant-image and
  # push-dockerhub-image depend on it — a failure here blocks Docker image
  # builds, which in turn blocks npm publish, the macOS DMG, and GitHub Release.
  ci-assistant:
    needs: extract-version
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: assistant

      - name: Install nested package dependencies
        run: |
          for dir in packages/*/ skills/*/; do
            [ -f "${dir}/package.json" ] || continue
            echo "Installing dependencies in ${dir}"
            (cd "${dir}" && bun install --frozen-lockfile 2>/dev/null || bun install)
          done

      - name: Lint
        run: bun run lint
        working-directory: assistant

      - name: Typecheck
        run: bunx tsc --noEmit
        working-directory: assistant

      - name: Restore test durations cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: assistant/.test-durations
          key: test-durations-unused
          restore-keys: test-durations-

      - name: Test
        run: bun run test:stable
        working-directory: assistant
        env:
          TEST_WORKERS: '16'
          TEST_DURATIONS_FILE: .test-durations
          TEST_DURATIONS_OUTPUT: .test-durations

      - name: Save test durations cache
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: assistant/.test-durations
          key: test-durations-${{ github.run_id }}

  ci-cli:
    needs: extract-version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: cli

      - name: Lint
        run: bun run lint
        working-directory: cli

      - name: Typecheck
        run: bun run typecheck
        working-directory: cli

  ci-gateway:
    needs: extract-version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: gateway

      - name: Lint
        run: bun run lint
        working-directory: gateway

      - name: Typecheck
        run: bun run typecheck
        working-directory: gateway

      - name: Test
        run: bun run test
        working-directory: gateway

  ci-credential-executor:
    needs: extract-version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: credential-executor

      - name: Install linked package dependencies
        run: |
          for pkg in $(jq -r '.bundledDependencies[]' credential-executor/package.json | sed 's|@vellumai/||'); do
            cd packages/$pkg && bun install --frozen-lockfile && cd ../..;
          done

      - name: Typecheck
        run: bun run typecheck
        working-directory: credential-executor

      - name: Test
        run: bun run test
        working-directory: credential-executor

  ci-playwright:
    name: Playwright Tests
    needs: [extract-version, build-macos-arm64]
    if: ${{ !cancelled() && needs.build-macos-arm64.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      playwright-run-id: ${{ steps.wait.outputs.playwright-run-id }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: vellum-assistant-platform

      - name: Trigger Playwright workflow in platform repo
        id: trigger
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PLAYWRIGHT_ENVIRONMENT: ${{ needs.extract-version.outputs.is_staging == 'true' && 'staging' || 'auto' }}
        run: |
          SOURCE="run:${{ github.run_id }}"
          BEFORE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"

          curl -fsSL \
            -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/vellum-ai/vellum-assistant-platform/actions/workflows/playwright.yaml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"source\":\"$SOURCE\",\"environment\":\"$PLAYWRIGHT_ENVIRONMENT\",\"shards\":\"4\",\"test_filter\":\"critical\"}}"

          echo "Triggered playwright workflow with source $SOURCE and environment $PLAYWRIGHT_ENVIRONMENT"
          sleep 15

      - name: Wait for Playwright workflow result
        id: wait
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          RUN_ID=""
          for i in $(seq 1 30); do
            RUN_ID=$(curl -fsSL \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/vellum-ai/vellum-assistant-platform/actions/workflows/playwright.yaml/runs?created=>=${{ steps.trigger.outputs.before }}&event=workflow_dispatch&per_page=1" \
              | python3 -c "import sys,json; runs=json.load(sys.stdin).get('workflow_runs',[]); print(runs[0]['id'] if runs else '')")

            if [ -n "$RUN_ID" ]; then
              echo "Found workflow run: $RUN_ID"
              echo "playwright-run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
              RUN_URL="https://github.com/vellum-ai/vellum-assistant-platform/actions/runs/$RUN_ID"
              echo "Run URL: $RUN_URL"
              break
            fi
            echo "Waiting for run to appear... (attempt $i/30)"
            sleep 10
          done

          if [ -z "$RUN_ID" ]; then
            echo "::error::Could not find triggered workflow run after 5 minutes"
            exit 1
          fi

          while true; do
            RESPONSE=$(curl -fsSL \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/vellum-ai/vellum-assistant-platform/actions/runs/$RUN_ID")

            RUN_STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            CONCLUSION=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('conclusion') or '')")

            echo "$(date -u +%H:%M:%S) Run $RUN_ID: status=$RUN_STATUS conclusion=$CONCLUSION"

            if [ "$RUN_STATUS" = "completed" ]; then
              RUN_URL="https://github.com/vellum-ai/vellum-assistant-platform/actions/runs/$RUN_ID"
              if [ "$CONCLUSION" = "success" ]; then
                echo "Playwright tests passed! $RUN_URL"
                exit 0
              else
                echo "::error::Playwright tests failed (conclusion: $CONCLUSION). See: $RUN_URL"
                exit 1
              fi
            fi

            sleep 30
          done

  # ── Sparkle Rolling Release (Staging) ──────────────────────────────────
  # ── Upload Sparkle artifacts to GCS (staging) ─────────────────────────
  # Push appcast.xml + ZIP to the public vellum-staging-sparkle GCS bucket.
  # Staging macOS builds have SUFeedURL pointing here, keeping GitHub
  # releases clean (no staging pre-releases on the public releases page).

  upload-sparkle-staging:
    needs: [extract-version, build-macos-arm64]
    if: ${{ needs.extract-version.outputs.is_staging == 'true' && needs.build-macos-arm64.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download macOS build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: macos-build
          path: macos-artifacts

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Upload Sparkle artifacts to GCS
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          BUCKET="vellum-staging-sparkle"

          ZIP=$(find macos-artifacts -name "vellum-assistant.zip" -type f | head -1)
          APPCAST=$(find macos-artifacts -name "appcast.xml" -type f | head -1)
          DMG=$(find macos-artifacts -name "vellum-assistant.dmg" -type f | head -1)

          if [ -z "$ZIP" ] || [ -z "$APPCAST" ]; then
            echo "::warning::Sparkle artifacts not found, skipping GCS upload"
            exit 0
          fi

          gcloud storage cp "$ZIP" "gs://${BUCKET}/staging/vellum-assistant.zip"
          gcloud storage cp "$APPCAST" "gs://${BUCKET}/staging/appcast.xml"
          [ -n "$DMG" ] && gcloud storage cp "$DMG" "gs://${BUCKET}/staging/vellum-assistant.dmg"

          echo "Uploaded staging Sparkle artifacts to gs://${BUCKET}/staging/ (version=${VERSION})"

  notify-staging-dmg:
    name: Slack Notification (Staging DMG Ready)
    needs: [extract-version, build-macos-arm64, build-macos-x64]
    if: ${{ !cancelled() && needs.extract-version.outputs.is_staging == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Build Slack payload
        env:
          SLACK_USER_ID: ${{ inputs.slack_user_id }}
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          ARM_RESULT="${{ needs.build-macos-arm64.result }}"
          X64_RESULT="${{ needs.build-macos-x64.result }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ -n "$SLACK_USER_ID" ]; then
            TRIGGERED_BY="<@${SLACK_USER_ID}>"
          else
            TRIGGERED_BY="${{ github.actor }}"
          fi

          ci_icon() { if [ "$1" = "success" ]; then printf '✅'; elif [ "$1" = "skipped" ]; then printf '⏭️'; else printf '❌'; fi; }

          if [ "$ARM_RESULT" = "success" ]; then
            HEADER="✅ Desktop DMG Ready — v${VERSION}"
            BODY=$(printf 'The staging Desktop DMG has finished building and is available for testing.\n\n*Builds:*\n• %s arm64\n• %s x64\n\n*Version:* `%s`\n*Triggered by:* %s' "$(ci_icon "$ARM_RESULT")" "$(ci_icon "$X64_RESULT")" "$VERSION" "$TRIGGERED_BY")
          else
            HEADER="❌ Desktop DMG Build Failed — v${VERSION}"
            BODY=$(printf 'The staging Desktop DMG build failed.\n\n*Builds:*\n• %s arm64\n• %s x64\n\n*Version:* `%s`\n*Triggered by:* %s' "$(ci_icon "$ARM_RESULT")" "$(ci_icon "$X64_RESULT")" "$VERSION" "$TRIGGERED_BY")
          fi

          BLOCKS="[]"
          BLOCKS=$(echo "$BLOCKS" | jq --arg header "$HEADER" '. + [{ type: "header", text: { type: "plain_text", text: $header } }]')
          BLOCKS=$(echo "$BLOCKS" | jq --arg body "$BODY" '. + [{ type: "section", text: { type: "mrkdwn", text: $body } }]')

          ARTIFACTS_URL="${RUN_URL}#artifacts"

          if [ "$ARM_RESULT" = "success" ]; then
            DOWNLOAD_BTN=$(jq -n --arg url "$ARTIFACTS_URL" '{
              type: "button",
              text: { type: "plain_text", text: "Download DMG" },
              url: $url,
              style: "primary"
            }')
          else
            DOWNLOAD_BTN=$(jq -n --arg url "$RUN_URL" '{
              type: "button",
              text: { type: "plain_text", text: "View Run" },
              url: $url,
              style: "danger"
            }')
          fi

          BLOCKS=$(echo "$BLOCKS" | jq --argjson btn "$DOWNLOAD_BTN" '. + [{ type: "actions", elements: [$btn] }]')

          jq -n --argjson blocks "$BLOCKS" '{
            unfurl_links: false,
            unfurl_media: false,
            blocks: $blocks
          }' > /tmp/slack-payload.json

      - name: Notify Slack
        id: slack
        continue-on-error: true
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack-payload.json
          errors: true

      - name: Log Slack notification result
        if: always()
        run: |
          echo "Slack step outcome: ${{ steps.slack.outcome }}"
          if [ "${{ steps.slack.outcome }}" != "success" ]; then
            echo "::warning::Staging DMG Slack notification failed to send."
          fi

  notify-release:
    name: Slack Notification (Release)
    if: ${{ always() && !cancelled() }}
    needs: [extract-version, publish-npm, publish-meta, build-macos-arm64, build-macos-x64, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest, push-dockerhub-image, register-release, release, merge-release-branch, update-platform, pack-cli, trigger-platform-qa, dispatch-ios-release, ci-assistant, ci-cli, ci-credential-executor, ci-gateway, ci-playwright, build-chrome-extension, publish-chrome-extension]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Build Slack payload
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TRIGGER_SECRET: ${{ secrets.RELEASE_TRIGGER_SECRET }}
          SLACK_USER_ID: ${{ inputs.slack_user_id }}
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          VERSION_TAG="v${VERSION}"
          IS_STAGING="${{ needs.extract-version.outputs.is_staging }}"

          # Determine release status
          RELEASE_FAILED="false"
          if [ "$IS_STAGING" != "true" ] && [ "${{ needs.release.result }}" != "success" ]; then
            RELEASE_FAILED="true"
          fi

          # For staging releases, check that desktop app and Docker images were successfully pushed
          STAGING_READY="true"
          if [ "$IS_STAGING" = "true" ]; then
            if [ "${{ needs.build-macos-arm64.result }}" != "success" ]; then
              STAGING_READY="false"
            fi
            if [ "${{ needs.push-assistant-manifest.result }}" != "success" ]; then
              STAGING_READY="false"
            fi
            if [ "${{ needs.push-gateway-manifest.result }}" != "success" ]; then
              STAGING_READY="false"
            fi
            if [ "${{ needs.push-credential-executor-manifest.result }}" != "success" ]; then
              STAGING_READY="false"
            fi
            if [ "${{ needs.register-release.result }}" != "success" ]; then
              STAGING_READY="false"
            fi
          fi

          if [ "$IS_STAGING" = "true" ]; then
            if [ "$STAGING_READY" != "true" ]; then
              HEADER="❌ Staging Release ${VERSION_TAG} Failed"
              STYLE="danger"
            else
              HEADER="🟡 Staging Release ${VERSION_TAG} Ready"
              STYLE=""
            fi
          elif [ "$RELEASE_FAILED" = "true" ]; then
            HEADER="❌ Release ${VERSION_TAG} Failed"
            STYLE="danger"
          else
            HEADER="✅ Release ${VERSION_TAG} Succeeded"
            STYLE=""
          fi

          # Build CI status icons
          ci_icon() { if [ "$1" = "success" ]; then printf '✅'; elif [ "$1" = "skipped" ]; then printf '⏭️'; else printf '❌'; fi; }

          A=$(ci_icon "${{ needs.ci-assistant.result }}")
          C=$(ci_icon "${{ needs.ci-cli.result }}")
          CE=$(ci_icon "${{ needs.ci-credential-executor.result }}")
          G=$(ci_icon "${{ needs.ci-gateway.result }}")
          P=$(ci_icon "${{ needs.ci-playwright.result }}")
          D=$(ci_icon "${{ needs.build-macos-arm64.result }}")
          DX=$(ci_icon "${{ needs.build-macos-x64.result }}")
          AI=$(ci_icon "${{ needs.push-assistant-manifest.result }}")
          GI=$(ci_icon "${{ needs.push-gateway-manifest.result }}")
          CEI=$(ci_icon "${{ needs.push-credential-executor-manifest.result }}")
          DH=$(ci_icon "${{ needs.push-dockerhub-image.result }}")
          RR=$(ci_icon "${{ needs.register-release.result }}")
          PC=$(ci_icon "${{ needs.pack-cli.result }}")
          TQ=$(ci_icon "${{ needs.trigger-platform-qa.result }}")
          DI=$(ci_icon "${{ needs.dispatch-ios-release.result }}")
          CX=$(ci_icon "${{ needs.build-chrome-extension.result }}")
          CXP=$(ci_icon "${{ needs.publish-chrome-extension.result }}")
          MERGE_OUTCOME="${{ needs.merge-release-branch.outputs.outcome || needs.merge-release-branch.result }}"
          MB=$(ci_icon "$MERGE_OUTCOME")

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PLAYWRIGHT_LINE=""
          if [ "${{ needs.ci-playwright.result }}" != "success" ]; then
            PLAYWRIGHT_RUN_ID="${{ needs.ci-playwright.outputs.playwright-run-id }}"
            if [ -n "$PLAYWRIGHT_RUN_ID" ]; then
              PLAYWRIGHT_LINE=" (<https://qa.vellum.ai/runs/${PLAYWRIGHT_RUN_ID}|view report>)"
            else
              PLAYWRIGHT_LINE=" (<${RUN_URL}#artifacts|view report>)"
            fi
          fi

          CI_LINE=$(printf '*CI Checks:*\n• %s assistant\n• %s cli\n• %s credential-executor\n• %s gateway\n• %s playwright%s\n• %s desktop (arm64)\n• %s desktop (x64)\n• %s dispatch-ios-release\n• %s chrome-extension\n• %s cws-publish\n• %s assistant-docker\n• %s gateway-docker\n• %s credential-executor-docker\n• %s dockerhub\n• %s register-release\n• %s pack-cli\n• %s trigger-platform-qa\n• %s merge-release-branch' "$A" "$C" "$CE" "$G" "$P" "$PLAYWRIGHT_LINE" "$D" "$DX" "$DI" "$CX" "$CXP" "$AI" "$GI" "$CEI" "$DH" "$RR" "$PC" "$TQ" "$MB")

          if [ -n "$SLACK_USER_ID" ]; then
            TRIGGERED_BY="<@${SLACK_USER_ID}>"
          else
            TRIGGERED_BY="${{ github.actor }}"
          fi

          if [ "$IS_STAGING" = "true" ]; then
            META_LINE=$(printf '*Version:* `%s`\n*Triggered by:* %s\n\n_This is a staging release. npm, GitHub Release, and DockerHub publishes were skipped. Docker images pushed to staging GCR and release registered._' "$VERSION" "$TRIGGERED_BY")
          else
            META_LINE=$(printf '*Version:* `%s`\n*Triggered by:* %s' "$VERSION" "$TRIGGERED_BY")
          fi

          # Fetch release notes from GitHub release (only for production releases)
          RELEASE_BODY=""
          if [ "$IS_STAGING" != "true" ]; then
            RELEASE_BODY=$(gh release view "$VERSION_TAG" --repo "${{ github.repository }}" --json body -q .body 2>/dev/null || echo "")
          fi

          RELEASE_SUMMARY=""
          if [ -n "$RELEASE_BODY" ]; then
            # Extract highlights bullets for the Slack summary
            HIGHLIGHTS=$(echo "$RELEASE_BODY" | awk '/^## Highlights/{f=1; next} /^(## |---$)/{f=0} f' | grep '^- ' || true)

            if [ -n "$HIGHLIGHTS" ]; then
              # Use highlights as the release summary, converted to Slack mrkdwn
              RELEASE_SUMMARY=$(echo "$HIGHLIGHTS" | \
                sed 's/\*\*\([^*]*\)\*\*/*\1*/g' | \
                sed 's/\[\([^]]*\)\](\([^)]*\))/<\2|\1>/g')
            fi
          fi

          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${VERSION_TAG}"

          # Build JSON payload with jq
          BLOCKS="[]"

          # Header
          BLOCKS=$(echo "$BLOCKS" | jq --arg header "$HEADER" '. + [{ type: "header", text: { type: "plain_text", text: $header } }]')

          # Release summary (if available)
          if [ -n "$RELEASE_SUMMARY" ]; then
            BLOCKS=$(echo "$BLOCKS" | jq --arg summary "$RELEASE_SUMMARY" '. + [{ type: "section", text: { type: "mrkdwn", text: $summary } }]')
          fi

          # CI checks + metadata
          BODY=$(printf '%s\n\n%s' "$CI_LINE" "$META_LINE")
          BLOCKS=$(echo "$BLOCKS" | jq --arg body "$BODY" '. + [{ type: "section", text: { type: "mrkdwn", text: $body } }]')

          # Warning if merge-release-branch failed
          if [ "$MERGE_OUTCOME" != "success" ] && [ "$MERGE_OUTCOME" != "skipped" ] && [ "$IS_STAGING" != "true" ] && [ "$RELEASE_FAILED" != "true" ]; then
            MERGE_WARNING="⚠️ *The release branch failed to merge to main and must be merged manually.* Run \`gh pr create --base main --head release/v${VERSION}\` and merge."
            BLOCKS=$(echo "$BLOCKS" | jq --arg warning "$MERGE_WARNING" '. + [{ type: "section", text: { type: "mrkdwn", text: $warning } }]')
          fi

          # Buttons
          VIEW_RUN=$(jq -n --arg url "$RUN_URL" --arg style "$STYLE" '{
            type: "button",
            text: { type: "plain_text", text: "View Run" },
            url: $url
          } + (if $style != "" then { style: $style } else {} end)')

          VIEW_RELEASE=$(jq -n --arg url "$RELEASE_URL" '{
            type: "button",
            text: { type: "plain_text", text: "View Release" },
            url: $url,
            style: "primary"
          }')

          # Build "Go live!" button only for release branch staging deploys (not main dispatches)
          IS_RELEASE_BRANCH="false"
          if [[ "${GITHUB_REF_NAME}" == release/v* ]]; then
            IS_RELEASE_BRANCH="true"
          fi

          if [ "$IS_STAGING" = "true" ] && [ "$STAGING_READY" = "true" ] && [ "$IS_RELEASE_BRANCH" = "true" ] && [ -n "$RELEASE_TRIGGER_SECRET" ]; then
            RELEASE_BRANCH="release/v${{ needs.extract-version.outputs.base_version }}"
            GO_LIVE_TS=$(date +%s)
            GO_LIVE_SIG=$(echo -n "${RELEASE_BRANCH}:${GO_LIVE_TS}" | openssl dgst -sha256 -hmac "$RELEASE_TRIGGER_SECRET" -hex | awk '{print $NF}')
            GO_LIVE_URL="https://qa.vellum.ai/api/slack/go-live?branch=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${RELEASE_BRANCH}', safe=''))")&ts=${GO_LIVE_TS}&sig=${GO_LIVE_SIG}"
            GO_LIVE=$(jq -n --arg url "$GO_LIVE_URL" '{
              type: "button",
              text: { type: "plain_text", text: "Go live!" },
              url: $url,
              style: "primary"
            }')
          fi

          if [ "$RELEASE_FAILED" = "true" ] || [ "$IS_STAGING" = "true" ]; then
            if [ -n "${GO_LIVE:-}" ]; then
              BUTTONS=$(jq -n --argjson run "$VIEW_RUN" --argjson golive "$GO_LIVE" '[$run, $golive]')
            else
              BUTTONS=$(jq -n --argjson run "$VIEW_RUN" '[$run]')
            fi
          else
            BUTTONS=$(jq -n --argjson run "$VIEW_RUN" --argjson release "$VIEW_RELEASE" '[$run, $release]')
          fi

          BLOCKS=$(echo "$BLOCKS" | jq --argjson buttons "$BUTTONS" '. + [{ type: "actions", elements: $buttons }]')

          jq -n --argjson blocks "$BLOCKS" '{
            unfurl_links: false,
            unfurl_media: false,
            blocks: $blocks
          }' > /tmp/slack-payload.json

      - name: Notify Slack
        id: slack
        continue-on-error: true
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack-payload.json
          errors: true

      - name: Log Slack notification result
        if: always()
        run: |
          echo "Slack step outcome: ${{ steps.slack.outcome }}"
          echo "Slack response ok: ${{ steps.slack.outputs.ok }}"
          echo "Slack response time: ${{ steps.slack.outputs.time }}"
          if [ "${{ steps.slack.outcome }}" != "success" ]; then
            echo "::warning::Slack notification failed to send. Check webhook URL and channel configuration."
          fi
