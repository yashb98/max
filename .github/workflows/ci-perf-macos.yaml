name: CI – macOS Performance Baselines

on:
  workflow_dispatch:
    inputs:
      update_baseline:
        description: 'Update stored baselines (only effective on main branch)'
        type: boolean
        default: true

jobs:
  perf-baselines:
    name: XCTest Performance Baselines
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Compute cache week
        id: week
        run: echo "num=$(date -u +%V)" >> "$GITHUB_OUTPUT"

      - name: Cache SPM build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: clients/.build
          key: macos-spm-debug-week${{ steps.week.outputs.num }}-${{ hashFiles('clients/Package.resolved') }}
          restore-keys: |
            macos-spm-debug-week${{ steps.week.outputs.num }}-
            macos-spm-debug-

      - name: Download previous baseline artifact
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Find the latest successful run of this workflow on main and download
          # its perf-baselines artifact.  The gh CLI natively supports v4 artifacts,
          # avoiding compatibility issues with third-party download actions.
          RUN_ID=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow ci-perf-macos.yaml \
            --branch main \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          if [ -n "$RUN_ID" ] && [ "$RUN_ID" != "null" ]; then
            echo "Downloading perf-baselines from run $RUN_ID"
            gh run download "$RUN_ID" \
              --repo "${{ github.repository }}" \
              --name perf-baselines \
              --dir .perf-baselines \
            || echo "Warning: Could not download baseline artifact from run $RUN_ID"
          else
            echo "Warning: No previous successful run found on main — first run will establish the baseline"
          fi
        continue-on-error: true

      - name: Run performance tests
        run: |
          set -o pipefail
          mkdir -p .perf-baselines
          # Remove stale summary from artifact download so a failed test run
          # doesn't cause the PR comment step to post outdated results.
          rm -f .perf-baselines/summary.md
          swift test --package-path clients --filter 'MarkdownPerformanceTests|MessageListAnchorPerformanceTests|AXTreeDiffPerformanceTests' 2>&1 | tee .perf-baselines/results.log

      - name: Compare baselines
        env:
          UPDATE_BASELINE: ${{ inputs.update_baseline && github.ref == 'refs/heads/main' && 'true' || 'false' }}
        run: bash scripts/compare-perf-baselines.sh

      - name: Performance summary
        if: always()
        run: |
          if [ -f .perf-baselines/summary.md ]; then
            cat .perf-baselines/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload new baselines
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: perf-baselines
          path: .perf-baselines/
          include-hidden-files: true
          retention-days: 90
