<!doctype html>
<!--
  Fixture: Google Meet chat side panel, opened.

  Covers the composer (textarea + send) and a rendered message list with a
  single message containing the sender/text/timestamp subnodes. Shape
  approximation — see README § "Refreshing Meet DOM fixtures".

  TODO(meet-dom): The next live refresh is expected during the Phase 1.12
  smoke test, driven by a maintainer against a real Meet session. This file was
  last verified (selector tests green) on 2026-04-19 but has not been
  replaced with a fresh outer-HTML capture since authorship. When the
  smoke test runs, replace this block with the captured DOM and bump
  `GOOGLE_MEET_SELECTOR_VERSION` in `src/dom/selectors.ts`.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Meet — Chat panel</title>
  </head>
  <body>
    <div id="yDmH0d">
      <aside aria-label="Side panel">
        <header>
          <h2>In-call messages</h2>
        </header>

        <!-- Rendered message history. -->
        <div role="list" aria-label="Chat messages">
          <div role="listitem" data-message-id="msg-001">
            <span data-sender-name>Alice</span>
            <time datetime="2026-04-15T12:34:00Z">12:34 PM</time>
            <p data-message-text>Hello everyone, welcome to the meeting.</p>
          </div>
        </div>

        <!-- Composer. Live Meet decorates the aria-label with "to everyone"
             (and similar context qualifiers) — see selectors.ts § chatSelectors
             for the prefix-match selector rationale. -->
        <div class="chat-composer" role="group">
          <textarea
            aria-label="Send a message to everyone"
            placeholder="Send a message to everyone"
            rows="1"
          ></textarea>
          <button type="button" aria-label="Send a message to everyone">
            Send
          </button>
        </div>
      </aside>
    </div>
  </body>
</html>
